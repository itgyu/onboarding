function sheetHtml(b){
  const data=b.data||{};const all=STEPS.every((_,i)=>stepDone(i,data));const pct=progressOf(data);
  const rows=STEPS.map((st,si)=>{const done=stepDone(si,data);const started=st.fields.some(f=>data[f.k]!==undefined);
    const pill=done?'<span class="pill p-done">완료</span>':started?'<span class="pill p-prog">진행중</span>':'<span class="pill p-wait">시작 전</span>';
    return `<div class="sstep"><h4>${esc(st.tag)} · ${esc(st.title)} ${pill}</h4>${answers(st,data)}</div>`;}).join("");
  return `<div class="sheethd">
    <div class="r1"><h3>${esc(b.name)}</h3>${all?'<span class="pill p-done">온보딩 완료</span>':`<span class="pill p-prog">진행 ${pct}%</span>`}</div>
    ${b.updatedAt?`<div class="metaline">마지막 업데이트 ${esc(fmt(b.updatedAt))}</div>`:""}
    <div class="r2"><button class="ghost blue" data-pdf="${S.adminSel}">📄 PDF 내려받기 (개발 전달용)</button>
      <button class="ghost" data-copybrand="${S.adminSel}">🔗 브랜드 링크 복사</button>
      <span style="flex:1"></span><button class="ghost danger" data-del="${esc(b.id)}">삭제</button></div>
    </div>${rows}`;
}
function fmt(iso){try{const d=new Date(iso);return d.getFullYear()+"."+p2(d.getMonth()+1)+"."+p2(d.getDate())+" "+p2(d.getHours())+":"+p2(d.getMinutes());}catch(e){return iso.slice(0,16);}}
const p2=n=>(""+n).padStart(2,"0");
const arow=(k,v)=>`<div class="arow"><div class="ak">${esc(k)}</div><div class="av">${v}</div></div>`;
const chip=(t,c="")=>`<span class="chip ${c}">${esc(t)}</span>`;
function answers(st,data){
  let out="";
  st.fields.forEach(f=>{if(f.type==="info")return;if(f.showIf&&!f.showIf(data))return;const v=data[f.k];const lab=f.alabel||shortL(f.label);
    if(f.type==="multi"){const a=Array.isArray(v)?v:[];out+=arow(lab,a.length?a.map(x=>chip(x,"ok")).join(" "):"—");}
    else if(f.type==="confirm")out+=arow(lab,v===true?chip("완료 ✓","ok"):"—");
    else if(f.type==="textarea")out+=arow(lab,v?`<span class="notequote">“${esc(v)}”</span>`:"—");
    else if(f.type==="date"||f.type==="text")out+=arow(lab,v?esc(v):"—");
    else if(f.type==="radio")out+=arow(lab,v?chip(v,v==="변경·요청 있음"||(f.mustBe&&v!==f.mustBe)?"chg":"ok"):"—");
    else if(f.type==="inputs")f.items.forEach(it=>{const tv=(((v||{})[it.id])||"").trim();out+=arow(it.alabel||shortL(it.label),tv?`<span class="av plain">${esc(tv)}</span>`:"—");});
    else if(f.type==="checklist"){
      const parts=f.items.map(it=>{const s=(v||{})[it.id];
        if(s&&typeof s==="object"&&s.key)return `<span class="chip file">📎 ${esc(shortL(it.label))} · ${esc(s.name)} <a class="dl" href="#" data-dl="${esc(s.key)}">다운로드</a></span>`;
        if(s==="done")return chip(shortL(it.label)+" ✓","ok");
        if(s==="na")return chip(shortL(it.label)+" · 해당없음","no");
        return "";}).filter(Boolean);
      out+=arow(lab,parts.join(" ")||"—");}
    else if(f.type==="terms"){const arr=f.items.map((t,i)=>({t,c:(v||{})[i]}));
      const std=arr.filter(x=>x.c&&x.c.choice==="표준").length;const chg=arr.filter(x=>x.c&&x.c.choice==="변경");
      out+=arow(lab,`${chip("표준 그대로 "+std+"건","ok")} ${chg.length?chip("변경요청 "+chg.length+"건","chg"):chip("변경 0건","no")}`);
      chg.forEach(x=>out+=arow("↳ "+x.t.n,`${chip("변경","chg")} <span class="notequote">${x.c.note?'“'+esc(x.c.note)+'”':"(내용 미기재)"}</span>`));}
    else if(f.type==="channels")f.items.forEach(it=>{const cv=(v||{})[it.id];
      const disp=Array.isArray(cv)?(cv.length?cv.map(x=>chip(x,x==="미사용"?"no":"ok")).join(" "):"—"):(cv?chip(cv,(cv==="미사용"||cv==="미도입")?"no":"ok"):"—");
      out+=arow(it.label,disp);});
  });
  return out;
}

/* ---- PDF (print) ---- */
function openPdf(b){
  const data=b.data||{};const pct=progressOf(data);
  let body="";
  STEPS.forEach((st,si)=>{
    const done=stepDone(si,data);
    body+=`<div class="ps"><div class="ph">${esc(st.tag)} · ${esc(st.title)} <span class="pst ${done?"d":""}">${done?"완료":"미완료"}</span></div><table>`;
    st.fields.forEach(f=>{if(f.type==="info")return;if(f.showIf&&!f.showIf(data))return;const v=data[f.k];const lab=f.alabel||shortL(f.label);const push=(k,val)=>{body+=`<tr><td class="pk">${esc(k)}</td><td>${val}</td></tr>`;};
      if(f.type==="multi"){const a=Array.isArray(v)?v:[];push(lab,a.length?esc(a.join(", ")):"—");}
      else if(f.type==="confirm")push(lab,v===true?"완료":"—");
      else if(f.type==="textarea")push(lab,v?esc(v).replace(/\n/g,"<br>"):"—");
      else if(f.type==="date"||f.type==="text")push(lab,v?esc(v):"—");
      else if(f.type==="radio")push(lab,v?esc(v):"—");
      else if(f.type==="inputs")f.items.forEach(it=>{const tv=(((v||{})[it.id])||"").trim();push(it.alabel||shortL(it.label),tv?esc(tv):"—");});
      else if(f.type==="checklist"){const parts=f.items.map(it=>{const s=(v||{})[it.id];
        if(s&&typeof s==="object"&&s.key)return "📎 "+esc(shortL(it.label))+" ("+esc(s.name)+")";
        if(s==="done")return esc(shortL(it.label))+" ✓";if(s==="na")return esc(shortL(it.label))+" (해당없음)";return "";}).filter(Boolean);
        push(lab,parts.join("<br>")||"—");}
      else if(f.type==="terms"){const arr=f.items.map((t,i)=>({t,c:(v||{})[i]}));const std=arr.filter(x=>x.c&&x.c.choice==="표준").length;const chg=arr.filter(x=>x.c&&x.c.choice==="변경");
        push(lab,"표준 그대로 "+std+"건 / 변경요청 "+chg.length+"건");
        chg.forEach(x=>push("↳ "+x.t.n+" 변경요청",x.c.note?esc(x.c.note):"(내용 미기재)"));}
      else if(f.type==="channels")f.items.forEach(it=>{const cv=(v||{})[it.id];push(it.label,Array.isArray(cv)?(cv.join(", ")||"—"):(cv||"—"));});
    });
    body+=`</table></div>`;
  });
  const html=`<div class="pdoc">
    <div class="pcover"><div class="pbrand">소프트먼트 · 자사앱/멤버십 온보딩 결과지</div>
      <h1>${esc(b.name)}</h1>
      <div class="pmeta">진행률 ${pct}% · 생성일 ${esc(fmt(new Date().toISOString()))}${b.updatedAt?" · 최종 제출 "+esc(fmt(b.updatedAt)):""}</div>
      <div class="pnote">본 문서는 브랜드가 온보딩 위저드에서 제출한 내용을 개발 착수용으로 정리한 자료입니다. 첨부 서류·이미지는 관리자 화면의 [다운로드]에서 원본을 받으세요.</div></div>
    ${body}
    <div class="pfoot">ⓒ (주)소프트먼트 · 문서 자동 생성</div></div>`;
  const root=document.getElementById("printroot");
  root.innerHTML=`<style>
    .pdoc{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#191F28;max-width:760px;margin:0 auto}
    .pcover{border-bottom:3px solid #3182F6;padding-bottom:16px;margin-bottom:22px}
    .pbrand{font-size:12px;font-weight:800;color:#3182F6;letter-spacing:.02em}
    .pcover h1{font-size:30px;font-weight:900;margin:8px 0 6px;letter-spacing:-.03em}
    .pmeta{font-size:12.5px;color:#8B95A1;font-weight:700}
    .pnote{margin-top:12px;font-size:12px;color:#4E5968;background:#F2F4F6;padding:10px 12px;border-radius:8px;line-height:1.5}
    .ps{margin-bottom:20px;break-inside:avoid}
    .ph{font-size:15px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .pst{font-size:11px;font-weight:800;color:#8B95A1;background:#F2F4F6;padding:2px 8px;border-radius:99px}
    .pst.d{color:#15AA7B;background:#E7F7F0}
    table{width:100%;border-collapse:collapse;font-size:13px}
    td{border:1px solid #E5E8EB;padding:8px 11px;vertical-align:top;line-height:1.55}
    td.pk{width:190px;color:#4E5968;font-weight:700;background:#F9FAFB}
    .pfoot{margin-top:24px;text-align:center;font-size:11px;color:#8B95A1}
  </style>${html}`;
  const prevTitle=document.title;document.title="온보딩결과지_"+b.name;
  window.onafterprint=()=>{document.title=prevTitle;window.onafterprint=null;};
  window.print();
}

/* ================= events ================= */
function findField(fk){for(const st of STEPS)for(const f of st.fields)if(f.k===fk)return f;return null;}
function openTermFull(fk,i){
  const f=findField(fk);if(!f||!f.items[i])return;const t=f.items[i];
  const paras=(t.full||[t.s||""]).map(p=>`<p>${esc(p)}</p>`).join("");
  const bk=document.createElement("div");bk.className="modal-bk";
  bk.innerHTML=`<div class="modal" role="dialog" aria-modal="true"><div class="mhd"><h3>${i+1}. ${esc(t.n)}<span class="mtag">표준 양식 전문</span></h3><button class="mclose" aria-label="닫기">✕</button></div><div class="mbody">${paras}</div><div class="mfoot"><button class="mok">확인</button></div></div>`;
  const close=()=>{bk.remove();document.removeEventListener("keydown",onKey);};
  function onKey(e){if(e.key==="Escape")close();}
  bk.addEventListener("click",e=>{if(e.target===bk)close();});
  bk.querySelector(".mclose").onclick=close;bk.querySelector(".mok").onclick=close;
  document.addEventListener("keydown",onKey);document.body.appendChild(bk);
}
function bind(){
  document.querySelectorAll("[data-termfull]").forEach(el=>el.onclick=()=>openTermFull(el.dataset.termfull,+el.dataset.i));
  document.querySelectorAll("[data-go]").forEach(el=>el.onclick=()=>{if(el.hasAttribute("disabled"))return;S.viewStep=+el.dataset.go;render();window.scrollTo({top:0,behavior:"smooth"});});
  document.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>{const k=el.dataset.toggle;set(k,D()[k]===true?false:true);});
  document.querySelectorAll("[data-input]").forEach(el=>el.onchange=()=>set(el.dataset.input,el.value));
  document.querySelectorAll("[data-radio]").forEach(el=>el.onclick=()=>set(el.dataset.radio,el.dataset.val));
  document.querySelectorAll("[data-cl]").forEach(el=>el.onclick=e=>{if(e.target.closest("[data-na]"))return;toggleItem(el.dataset.cl,el.dataset.item);});
  document.querySelectorAll("[data-na]").forEach(el=>el.onclick=e=>{e.stopPropagation();setNa(el.dataset.na,el.dataset.item);});
  document.querySelectorAll("[data-term]").forEach(el=>el.onclick=()=>setTerm(el.dataset.term,+el.dataset.i,el.dataset.val));
  document.querySelectorAll("[data-tnote]").forEach(el=>el.oninput=()=>setTermNote(el.dataset.tnote,+el.dataset.i,el.value));
  document.querySelectorAll("[data-chan]").forEach(el=>el.onclick=()=>setChan(el.dataset.chan,el.dataset.item,el.dataset.val,el.dataset.multi==="true"));
  document.querySelectorAll("[data-multi2]").forEach(el=>el.onclick=()=>setMulti(el.dataset.multi2,el.dataset.val));
  document.querySelectorAll("[data-ta]").forEach(el=>{el.oninput=()=>{D()[el.dataset.ta]=el.value;scheduleSave();};el.onchange=()=>render();});
  document.querySelectorAll("[data-tin]").forEach(el=>{el.oninput=()=>{const k=el.dataset.tin;D()[k]=D()[k]||{};D()[k][el.dataset.item]=el.value;scheduleSave();};el.onchange=()=>render();});
  document.querySelectorAll("[data-up]").forEach(el=>el.onclick=e=>{e.stopPropagation();const inp=document.querySelector(`input[data-fin="${el.dataset.up}"][data-item="${el.dataset.item}"]`);if(inp)inp.click();});
  document.querySelectorAll("[data-fin]").forEach(el=>el.onchange=()=>uploadFile(el.dataset.fin,el.dataset.item,el.files[0]));
  document.querySelectorAll("[data-asel]").forEach(el=>el.onclick=()=>{S.adminSel=+el.dataset.asel;S.newLink=null;render();});
  document.querySelectorAll("[data-copy]").forEach(el=>el.onclick=()=>navigator.clipboard.writeText(el.dataset.copy).then(()=>el.textContent="복사됨 ✓"));
  document.querySelectorAll("[data-copybrand]").forEach(el=>el.onclick=()=>{const b=S.brands[+el.dataset.copybrand];const url=location.origin+location.pathname+"?b="+b.token;
    navigator.clipboard.writeText(url).then(()=>{el.textContent="복사됨 ✓";setTimeout(()=>el.textContent="🔗 브랜드 링크 복사",1500);});});
  document.querySelectorAll("[data-pdf]").forEach(el=>el.onclick=()=>openPdf(S.brands[+el.dataset.pdf]));
  document.querySelectorAll("[data-dl]").forEach(el=>el.onclick=async e=>{e.preventDefault();
    try{const r=await api("/api/file-url?k="+encodeURIComponent(AKEY)+"&key="+encodeURIComponent(el.dataset.dl));window.open(r.url,"_blank");}
    catch(err){alert("다운로드 링크 생성에 실패했어요.");}});
  const rf=document.getElementById("refresh");if(rf)rf.onclick=loadAdmin;
  const ab=document.getElementById("addb");if(ab)ab.onclick=async()=>{const inp=document.getElementById("newb");const name=inp.value.trim();if(!name)return;
    const r=await api("/api/brands?k="+encodeURIComponent(AKEY),{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({name})});
    S.newLink={name:r.name,url:location.origin+location.pathname+"?b="+r.token};await loadAdmin();};
  document.querySelectorAll("[data-del]").forEach(el=>el.onclick=async()=>{if(!confirm("이 브랜드와 제출 데이터를 삭제할까요?"))return;
    await api("/api/brand?id="+encodeURIComponent(el.dataset.del)+"&k="+encodeURIComponent(AKEY),{method:"DELETE"});S.newLink=null;await loadAdmin();});
}

/* ================= boot ================= */
async function loadAdmin(){
  try{const r=await api("/api/brands?k="+encodeURIComponent(AKEY));S.brands=r.brands;S.mode="admin";}
  catch(e){S.mode="error";S.errmsg="관리자 키가 올바르지 않아요.";}
  render();
}
(async()=>{
  if(S.mode==="brand"){S.mode="loading";render();
    try{const r=await api("/api/brand?b="+encodeURIComponent(BTOK));S.brand={name:r.name,data:r.data||{}};S.mode="brand";}
    catch(e){S.mode="error";S.errmsg="브랜드 링크가 올바르지 않아요. 담당 매니저에게 문의해 주세요.";}
    render();}
  else if(S.mode==="admin"){S.mode="loading";render();await loadAdmin();}
  else render();
})();
</script>
</body>
</html>
