<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>소프트먼트 온보딩</title>
<style>
:root{
  --bg:#FFFFFF; --section:#F9FAFB; --card:#FFFFFF; --ink:#191F28; --sub:#4E5968; --muted:#8B95A1;
  --line:#E5E8EB; --line-2:#D1D6DB;
  --blue:#3182F6; --blue-d:#1B64DA; --blue-weak:#EBF3FE; --blue-ink:#1957C2;
  --good:#15AA7B; --good-weak:#E7F7F0; --warn:#F59F00; --warn-weak:#FFF6E5; --danger:#F04452;
  --shadow-sm:0 1px 2px rgba(25,31,40,.04);
  --shadow:0 4px 16px rgba(25,31,40,.06),0 1px 2px rgba(25,31,40,.04);
  --shadow-lg:0 10px 34px rgba(25,31,40,.10);
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#17181C; --section:#1E2024; --card:#212329; --ink:#EFF1F4; --sub:#B0B8C1; --muted:#7C848D;
    --line:#2C2F36; --line-2:#3A3E46; --blue:#4593FC; --blue-d:#3182F6; --blue-weak:#152A47; --blue-ink:#9CC4FB;
    --good:#2DBE8E; --good-weak:#123528; --warn:#F5B841; --warn-weak:#3A2E12; --danger:#F86B76;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow:0 4px 18px rgba(0,0,0,.4); --shadow-lg:0 12px 40px rgba(0,0,0,.5);}
}
:root[data-theme="light"]{ --bg:#FFFFFF; --section:#F9FAFB; --card:#FFFFFF; --ink:#191F28; --sub:#4E5968; --muted:#8B95A1; --line:#E5E8EB; --line-2:#D1D6DB; --blue:#3182F6; --blue-d:#1B64DA; --blue-weak:#EBF3FE; --blue-ink:#1957C2; --good:#15AA7B; --good-weak:#E7F7F0; --warn:#F59F00; --warn-weak:#FFF6E5; --danger:#F04452; --shadow-sm:0 1px 2px rgba(25,31,40,.04); --shadow:0 4px 16px rgba(25,31,40,.06),0 1px 2px rgba(25,31,40,.04); --shadow-lg:0 10px 34px rgba(25,31,40,.10);}
:root[data-theme="dark"]{ --bg:#17181C; --section:#1E2024; --card:#212329; --ink:#EFF1F4; --sub:#B0B8C1; --muted:#7C848D; --line:#2C2F36; --line-2:#3A3E46; --blue:#4593FC; --blue-d:#3182F6; --blue-weak:#152A47; --blue-ink:#9CC4FB; --good:#2DBE8E; --good-weak:#123528; --warn:#F5B841; --warn-weak:#3A2E12; --danger:#F86B76; --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow:0 4px 18px rgba(0,0,0,.4); --shadow-lg:0 12px 40px rgba(0,0,0,.5);}

*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
h1,h2,h3,h4,p{margin:0} button{font-family:inherit;cursor:pointer;letter-spacing:-.01em}
.tnum{font-variant-numeric:tabular-nums}
::selection{background:var(--blue-weak)}

/* top bar */
.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 85%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:15px 22px;display:flex;align-items:center;gap:12px}
.brandmark{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px}
.dot{width:26px;height:26px;border-radius:9px;background:var(--blue);display:grid;place-items:center;color:#fff;font-size:14px;font-weight:900;box-shadow:0 2px 8px rgba(49,130,246,.35)}
.top .sp{flex:1}
.savest{font-size:13px;font-weight:700;color:var(--muted);transition:color .2s}
.savest.ok{color:var(--good)} .savest.err{color:var(--danger)}

/* buttons */
.btn{border:0;border-radius:14px;padding:15px 24px;font-weight:800;font-size:16px;transition:transform .06s,background .15s,box-shadow .15s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--blue);color:#fff;box-shadow:0 3px 12px rgba(49,130,246,.3)}
.btn.primary:hover{background:var(--blue-d)}
.btn.primary[disabled]{background:var(--line);color:var(--muted);cursor:not-allowed;box-shadow:none}
.btn.sub{background:var(--section);border:1px solid var(--line);color:var(--sub)}
.btn.sub[disabled]{opacity:.4;cursor:not-allowed}
.ghost{border:1px solid var(--line-2);background:var(--card);color:var(--sub);border-radius:11px;padding:9px 14px;font-weight:700;font-size:13.5px;transition:background .15s,border-color .15s}
.ghost:hover{background:var(--section);border-color:var(--line)}
.ghost.blue{color:var(--blue);border-color:var(--blue-weak);background:var(--blue-weak)}
.ghost.danger{color:var(--danger)}

/* brand flow */
.main{max-width:760px;margin:0 auto;padding:28px 20px 60px}
.stepper{display:flex;gap:7px;margin-bottom:26px}
.stepper .st{flex:1;display:flex;flex-direction:column;gap:8px}
.stepper .bar{height:6px;border-radius:99px;background:var(--line);transition:background .3s}
.stepper .st.done .bar{background:var(--good)}
.stepper .st.cur .bar{background:var(--blue)}
.stepper .lb{font-size:12px;font-weight:700;color:var(--muted)}
.stepper .st.done .lb,.stepper .st.cur .lb{color:var(--ink)}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:32px 30px 26px;animation:rise .32s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.card{animation:none}}
.eyebrow{font-size:12.5px;font-weight:800;letter-spacing:.02em;color:var(--blue)}
.qtitle{font-size:28px;font-weight:900;letter-spacing:-.03em;margin-top:8px;text-wrap:balance}
.qdesc{color:var(--sub);margin-top:10px;font-size:15.5px}
.who{display:inline-flex;gap:6px;margin-top:16px;font-size:12.5px;font-weight:800;padding:6px 12px;border-radius:99px;background:var(--blue-weak);color:var(--blue-ink)}
.field{margin-top:26px}
.flabel{font-weight:800;font-size:16px;margin-bottom:13px;display:flex;gap:8px;align-items:baseline}
.flabel .req{color:var(--blue);font-size:11.5px;font-weight:800;background:var(--blue-weak);padding:2px 7px;border-radius:6px}
.hint{color:var(--muted);font-size:12.5px;font-weight:600}
.guide{background:var(--section);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:15px;font-size:13.5px;line-height:1.62}
.guide .gw{color:var(--ink);font-weight:600;display:flex;gap:7px}
.guide .gl{color:var(--sub);margin-top:8px;padding-left:1px}
.guide .go{color:var(--blue-ink);margin-top:5px}
.guide .tagx{font-weight:800;margin-right:4px}
.guide .go .tagx{color:var(--blue)}
.guide b{font-weight:800}
.pol{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:9px}
.pol .pt{background:var(--section);padding:11px 15px;font-weight:800;font-size:14px;display:flex;gap:8px;align-items:center}
.pol .pt .b{background:var(--blue-weak);color:var(--blue-ink);font-size:11px;font-weight:800;border-radius:6px;padding:2px 7px}
.pol .pd{padding:11px 15px;font-size:13.5px;color:var(--sub);line-height:1.62}
.term .tcap{margin-top:9px;font-size:13px;color:var(--sub);line-height:1.6}
.termfull{margin-top:10px;background:var(--section);border:1px solid var(--line);color:var(--blue);font-weight:700;font-size:13px;border-radius:10px;padding:8px 13px;cursor:pointer;transition:all .12s}
.termfull:hover{background:var(--blue-weak);border-color:var(--blue)}
.modal-bk{position:fixed;inset:0;z-index:100;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .15s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:18px;max-width:640px;width:100%;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.28);animation:rise .2s}
.modal .mhd{display:flex;align-items:flex-start;gap:10px;padding:20px 22px 14px;border-bottom:1px solid var(--line)}
.modal .mhd h3{flex:1;font-size:17px;font-weight:800;line-height:1.4;margin:0}
.modal .mtag{display:inline-block;margin-left:7px;font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-weak);border-radius:6px;padding:2px 7px;vertical-align:middle}
.modal .mclose{border:none;background:var(--section);color:var(--sub);width:30px;height:30px;border-radius:9px;font-size:15px;cursor:pointer;flex:none}
.modal .mclose:hover{background:var(--line)}
.modal .mbody{padding:18px 22px;overflow-y:auto;font-size:14px;line-height:1.75;color:var(--ink)}
.modal .mbody p{margin:0 0 13px;white-space:pre-wrap}
.modal .mbody p:last-child{margin-bottom:0}
.modal .mfoot{padding:14px 22px;border-top:1px solid var(--line);text-align:right}
.modal .mok{background:var(--blue);color:#fff;border:none;border-radius:11px;padding:11px 22px;font-weight:700;font-size:14px;cursor:pointer}
textarea.ta{width:100%;border:1.5px solid var(--line-2);border-radius:12px;padding:13px 15px;font-family:inherit;font-size:15px;background:var(--card);color:var(--ink);min-height:120px;resize:vertical;line-height:1.6}
textarea.ta:focus{outline:none;border-color:var(--blue)}
.row{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1.5px solid var(--line);border-radius:14px;background:var(--card);margin-bottom:9px;cursor:pointer;transition:border-color .15s,background .15s}
.row:hover{border-color:var(--line-2)}
.row.on{border-color:var(--blue);background:var(--blue-weak)}
.chk{width:24px;height:24px;border-radius:8px;border:2px solid var(--line-2);display:grid;place-items:center;flex:none;color:#fff;font-size:14px;font-weight:900;transition:all .15s}
.row.on .chk{background:var(--blue);border-color:var(--blue)}
.row .txt{flex:1;font-weight:600;font-size:15px}
.row .na{border:1px solid var(--line-2);background:transparent;color:var(--muted);font-size:12px;font-weight:700;border-radius:9px;padding:7px 11px;white-space:nowrap}
.row.na-on{border-style:dashed;opacity:.7;background:var(--section)}
.row.na-on .na{background:var(--muted);color:var(--card);border-color:var(--muted)}
.filebtn{border:1px solid var(--blue-weak);background:var(--blue-weak);color:var(--blue);font-size:12.5px;font-weight:800;border-radius:10px;padding:8px 13px;white-space:nowrap}
.opts{display:flex;gap:9px;flex-wrap:wrap}
.opt{border:1.5px solid var(--line-2);background:var(--card);color:var(--sub);border-radius:12px;padding:11px 17px;font-weight:700;font-size:14.5px;transition:all .12s}
.opt:hover{border-color:var(--line-2);background:var(--section)}
.opt.on{border-color:var(--blue);background:var(--blue-weak);color:var(--blue-ink)}
.opt.warn.on{border-color:var(--warn);color:var(--warn);background:var(--warn-weak)}
.term{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px;transition:border-color .15s}
.term .thead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.term .tname{flex:1;font-weight:700;font-size:15px;min-width:150px}
.term .note{margin-top:11px;width:100%;border:1.5px solid var(--line-2);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:14px;background:var(--section);color:var(--ink)}
.term .note:focus{outline:none;border-color:var(--blue)}
.chanrow{border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.chanrow .cname{font-weight:700;font-size:15px;min-width:110px}
.chanrow .opts{margin-left:auto}
input[type=date],.tinput{border:1.5px solid var(--line-2);border-radius:12px;padding:13px 15px;font-family:inherit;font-size:15px;background:var(--card);color:var(--ink);width:100%;transition:border-color .15s}
input[type=date]:focus,.tinput:focus{outline:none;border-color:var(--blue)}
.nav{display:flex;align-items:center;gap:12px;margin-top:28px}
.nav .sp{flex:1}
.gatemsg{font-size:13px;color:var(--warn);font-weight:700;margin-top:16px;background:var(--warn-weak);padding:11px 14px;border-radius:11px}
.donemsg{font-size:13px;color:var(--good);font-weight:700;margin-top:16px;background:var(--good-weak);padding:11px 14px;border-radius:11px}
.finish{text-align:center;padding:44px 18px}
.finish .em{font-size:52px}
.finish .big{font-size:30px;font-weight:900;letter-spacing:-.03em;margin-top:8px}
.finish p{color:var(--sub);margin-top:12px;font-size:15.5px}
.foot{text-align:center;color:var(--muted);font-size:12.5px;margin-top:18px}
.landing{max-width:460px;margin:110px auto;text-align:center;padding:0 20px}
.landing .dot{width:52px;height:52px;border-radius:16px;margin:0 auto 20px;font-size:26px}
.landing h1{font-size:23px;font-weight:900;letter-spacing:-.03em}
.landing p{color:var(--sub);margin-top:12px;font-size:15px}

/* admin */
.adminmain{max-width:1180px;margin:0 auto;padding:26px 22px 60px}
.adminhead{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.adminhead h2{font-size:24px;font-weight:900;letter-spacing:-.03em}
.agrid{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
@media(max-width:900px){.agrid{grid-template-columns:1fr}}
.blist{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--shadow-sm)}
.blist .lt{font-size:12px;font-weight:800;color:var(--muted);padding:6px 10px 10px}
.bitem{display:flex;align-items:center;gap:12px;padding:13px 13px;border-radius:13px;cursor:pointer;border:1.5px solid transparent;transition:background .12s}
.bitem:hover{background:var(--section)}
.bitem.on{background:var(--blue-weak);border-color:var(--blue)}
.bitem .bn{font-weight:700;font-size:14.5px}
.bitem .pct{font-size:13px;font-weight:800;color:var(--blue);flex:none}
.mini{height:6px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:6px}
.mini i{display:block;height:100%;background:var(--good);transition:width .4s}
.addrow{display:flex;gap:8px;margin-top:12px;padding:0 4px}
.addrow input{flex:1;border:1.5px solid var(--line-2);border-radius:12px;padding:11px 13px;font-family:inherit;background:var(--card);color:var(--ink);min-width:0;font-size:14px}
.addrow input:focus{outline:none;border-color:var(--blue)}
.addrow button{border:0;background:var(--blue);color:#fff;border-radius:12px;padding:11px 16px;font-weight:800;font-size:14px}
.linkbox{margin:12px 4px 0;padding:12px 14px;border:1px solid var(--blue-weak);border-radius:12px;font-size:12.5px;color:var(--sub);background:var(--blue-weak)}
.linkbox b{color:var(--ink)} .linkbox .u{display:block;margin:6px 0;color:var(--blue-ink);overflow-wrap:anywhere;font-weight:600}

.sheet{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.sheethd{padding:22px 24px;border-bottom:1px solid var(--line)}
.sheethd .r1{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.sheethd h3{font-size:21px;font-weight:900;letter-spacing:-.03em}
.sheethd .r2{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.metaline{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:7px}
.pill{font-size:12px;font-weight:800;padding:5px 11px;border-radius:99px}
.p-done{background:var(--good-weak);color:var(--good)}
.p-prog{background:var(--blue-weak);color:var(--blue-ink)}
.p-wait{background:var(--section);color:var(--muted)}
.sstep{border-bottom:1px solid var(--line);padding:20px 24px}
.sstep:last-child{border-bottom:0}
.sstep h4{font-size:15px;font-weight:900;display:flex;align-items:center;gap:10px;margin:0 0 14px}
.arow{display:flex;gap:16px;padding:9px 0;border-top:1px solid var(--line)}
.arow:first-of-type{border-top:0}
.ak{width:184px;flex:none;color:var(--muted);font-weight:700;font-size:13.5px}
.av{flex:1;min-width:0;font-weight:600;font-size:14px;color:var(--ink);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.av.plain{display:block}
@media(max-width:620px){.arow{flex-direction:column;gap:3px}.ak{width:auto}}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--section);color:var(--sub)}
.chip.ok{background:var(--good-weak);color:var(--good)}
.chip.chg{background:var(--warn-weak);color:var(--warn)}
.chip.no{background:var(--section);color:var(--muted)}
.chip.file{background:var(--blue-weak);color:var(--blue-ink)}
.chip .dl{color:var(--blue);font-weight:800;text-decoration:none;border-bottom:1.5px solid var(--blue);margin-left:4px}
.notequote{color:var(--sub);font-weight:600;font-size:13.5px;font-style:italic}
.empty{padding:70px 24px;text-align:center;color:var(--muted)}
.foot2{max-width:1180px;margin:16px auto 0;padding:0 22px;color:var(--muted);font-size:12px;line-height:1.6}

/* print / PDF */
#printroot{display:none}
@media print{
  @page{size:A4;margin:14mm}
  .top,#app{display:none!important}
  #printroot{display:block!important}
  body{background:#fff}
}
</style>
</head>

<div id="app"></div>
<div id="printroot"></div>
<script>
"use strict";
const qsp=new URLSearchParams(location.search);
const BTOK=qsp.get("b"), AKEY=qsp.get("k");
let S={mode:BTOK?"brand":(AKEY?"admin":"landing"),brand:null,viewStep:undefined,brands:[],adminSel:0,saving:"idle",newLink:null,uploading:{}};

const STEPS=[
 {tag:"0단계",title:"NDA 체결",desc:"상세 자료 검토를 시작하기 전, 비밀유지계약(NDA)을 먼저 체결해요.",
  fields:[
   {k:"nda_ok",type:"confirm",label:"NDA(비밀유지계약서)를 검토하고 서명을 완료했습니다.",req:true,alabel:"NDA 서명"},
   {k:"nda_date",type:"date",label:"서명일 (선택)",alabel:"서명일"} ]},
 {tag:"1단계",title:"계약 & 필수 서류",desc:"계약을 체결하고 회사 서류·담당자 정보를 제출해요. 서류를 전부 제출해야 다음 단계로 넘어갑니다.",
  fields:[
   {k:"contract",type:"radio",label:"계약 체결이 완료되었나요?",req:true,options:["완료","진행 중"],mustBe:"완료",block:"계약 체결이 완료되어야 다음 단계로 넘어갈 수 있어요.",alabel:"계약 체결"},
   {k:"docs",type:"checklist",label:"구비 서류 제출 (파일을 첨부하면 각각 제출완료 처리돼요)",alabel:"구비 서류",req:true,items:[
     {id:"biz",label:"사업자등록증 사본",file:true},{id:"ecom",label:"통신판매업 신고증",file:true},
     {id:"corp",label:"법인 등기부등본",na:true,file:true},{id:"seal",label:"법인 인감증명서",na:true,file:true} ]},
   {k:"bizinfo",type:"inputs",label:"사업자 정보 입력",alabel:"사업자 정보",req:true,items:[
     {id:"addr",label:"회사 주소 (사업자등록증과 동일하게)",alabel:"회사 주소",ph:"서울특별시 ○○구 ○○로 00, 0층"},
     {id:"bizno",label:"사업자등록번호",ph:"000-00-00000"},
     {id:"csnum",label:"고객센터 대표번호",ph:"1544-0000"},
     {id:"kakao",label:"고객센터 카카오톡 채널명",ph:"@브랜드명"},
     {id:"email",label:"고객센터 이메일",ph:"cs@brand.co.kr"} ]},
   {k:"mgrs",type:"inputs",label:"담당자 3인 지정 (이름 · 연락처 · 이메일)",alabel:"담당자",req:true,items:[

 {tag:"2단계",title:"약관 & 외부 연동",desc:"소프트먼트가 표준 양식(참고용 초안)을 제공해 드려요. 각 약관 전문을 확인하시고, 브랜드사 자체 법무 검토를 거쳐 표준 그대로 적용할지·변경할지 결정해 주세요.",
  fields:[
   {k:"terms",type:"terms",label:"약관 9종 — 표준 그대로 / 변경 요청 (전부 선택해야 넘어가요)",alabel:"약관 검토",req:true,
    guide:{what:"각 약관 항목의 [📄 표준 양식 전문 보기]에서 전문을 확인하신 뒤, 브랜드사에서 자체 법무 검토를 거쳐 '표준 그대로' 적용할지·'변경 요청'할지 결정해 주세요. 변경 요청에 남기신 내용은 그대로 전달됩니다.",ours:"제공되는 표준 양식은 참고용 초안이에요. 최종 시행 책임과 법무 검토는 브랜드사에 있습니다."},items:[
     {"n": "서비스 이용약관", "s": "자사앱·멤버십 전체 이용 규정 — 가입·이용·해지, 회사와 회원의 권리·의무·책임.", "full": ["[표준 참고자료 #01]", "서비스 이용약관", "표준 참고자료 — 자사앱 멤버십·픽업오더·선물하기 운영 기준", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "제 1조 (목적)", "본 약관은 【회사명(법인 정식 명칭)】(이하 '회사' 또는 '【브랜드명】'이라 함)이 제공하는 멤버십 서비스(이하 '【멤버십 서비스명】'이라 함)의 이용과 관련하여 필요한 이용 조건 및 절차, '회사'와 '회원'간의 권리, 의무 등 기본적인 사항을 규정하는 것을 목적으로 합니다.", "제 2조 (용어의 정의)", "이 약관에서 사용하는 용어는 다음 각 호와 같이 정의합니다.", "'【멤버십 서비스명】'이란 '스탬프' 적립, '쿠폰'의 발행 및 사용, 선물하기, 【픽업오더 서비스명】, 【배달 서비스명】 등 '회사'가 '회원'에게 제공하는 멤버십 서비스를 통칭하여 말합니다.", "'회원'이란 이 약관에 따라 【멤버십 서비스명】 모바일 어플리케이션(이하 '앱'이라 합니다)을 통해 '회사'와 이용계약을 체결하고, 개인정보의 수집·활용 기타 사항들에 동의함으로써 '【멤버십 서비스명】' 서비스를 이용하는 고객을 말합니다.", "'매장'이란 '회사'가 직영으로 운영하는 모든 【브랜드명】 매장과 '회사'와 계약하여 【브랜드명】 브랜드를 이용하는 모든 가맹점을 말합니다.", "'스탬프'란 【브랜드명】 '매장'에서 【스탬프 적립 대상】 구매 시 적립되며, 스탬프 적립 정책에 따라 일정 수량 적립 시 '쿠폰'의 발행이 가능하도록 제공되는 서비스를 말합니다.", "'쿠폰'이란 '【멤버십 서비스명】' 서비스를 이용하여 발행된 모바일 쿠폰(상품권)의 형태로, '회원'에게 제공되거나 직접 구매를 통해 수령하여 '매장'에 제시하는 경우, '매장'에서 판매하는 제품 및 상품(이하 통칭하여 '상품'이라 함)으로 교환할 수 있는 권리가 있는 전자적 정보를 말하며, 발급 형태에 따라 멤버십쿠폰과 모바일상품권으로 구분됩니다.", "'금액권'이란 '회원'이 '선물하기'에서 일정금액을 지불하고 구매하여 '회원'이 '매장'에서 '상품' 구매 시 현금처럼 이용할 수 있도록 한 모바일 상품권을 말합니다.", "'부정 적립 및 이용'이란 '회사'가 예정하지 않은 방법에 따른 부정적립 및 부정이용을 의미합니다.", "'선물하기'란 '【멤버십 서비스명】'에서 '교환권' 및 '금액권'을 수신자의 휴대폰 번호를 이용하여 수신자에게 선물하는 행위를 말합니다.", "'결제'란 신용/체크카드, 모바일상품권, 휴대폰 소액결제, 간편결제 등 기타 '회사'가 지정한 방법으로 유료서비스의 대가를 지불하는 행위를 말합니다.", "'교환'이란 '회원'이 보유한 '쿠폰'을 '매장'에 제시하여 '쿠폰'에 명시된 '상품'을 제공받는 행위를 말합니다.", "'【픽업오더 서비스명】'이란 '회원'이 '매장'에 직접 방문함이 없이 '【멤버십 서비스명】'을 통해 '상품'을 선택하고 '결제'함으로써 빠르게 주문할 수 있는 전자상거래 서비스를 말합니다.", "제 3 조 (약관의 게시와 개정)", "'회사'는 이 약관의 내용을 '회원'이 쉽게 알 수 있도록 '【멤버십 서비스명】' 초기 화면에 게시합니다.", "'회사'는 '약관의 규제에 관한 법률', '정보통신망 이용촉진 및 정보보호 등에 관한 법률' 등 관련법을 위배하지 않는 범위에서 이 약관 및 '쿠폰'의 이용, '스탬프'의 적립조건 기타 서비스의 이용조건이나 내용 등을 개정할 수 있습니다.", "'회사'가 전항에 따른 개정을 할 경우에는 개정된 내용을 적용하고자 하는 날 7일 전부터 적용일자 전일까지 개정사실과 개정사유, 개정내용 등을 '홈페이지' 또는 '앱'에 공지합니다. 다만, 회원에게 불리하거나 중요한 사항의 변경은 적용일자 30일 전부터 공지하고, 회원에게 별도로 전자우편·앱 푸시 등으로 통지합니다.", "개별고지가 필요한 상황에는 '회원'이 '회사'에 가장 최근에 제공한 전자우편 주소 혹은 휴대폰번호를 활용하며, 이 경우 '회사'는 적법한 고지를 완료한 것으로 봅니다.", "'회사'가 제3항과 4항에 따라 공지 또는 고지한 개정사항이 적용된 이후에도 '회원'이 30일간 명시적인 거부의 의사표시 없이 계속적으로 서비스를 이용하는 경우에는 '회원'이 개정내용에 동의한 것으로 간주됩니다. 만약 '회원'이 본 조에 따라 개정된 내용의 적용에 동의하지 않는 경우 '회원'은 이용계약을 해지함으로써 개정된 내용의 적용을 배제할 수 있습니다.", "본 조에 의하여 개정된 약관은 원칙적으로 그 효력 발생일로부터 유효합니다.", "제 4 조 (약관의 해석)", "'회사'는 필요한 경우 특정 서비스에 관하여 별도의 이용약관 및 정책(이하 \"개별약관\")을 둘 수 있으며, 해당 내용이 이 약관과 상충할 경우에는 \"개별약관\"이 우선하여 적용됩니다.", "이 약관에서 정하지 아니한 사항이나 해석에 대해서는 관계법령 또는 상관례에 따릅니다.", "본 약관과 관련하여 회사의 정책 변경, 법령의 제·개정, 공공기관의 고시나 지침 등에 따라 회사가 홈페이지의 공지사항 게시판 등을 통해 공지하는 내용도 이용계약의 일부를 구성합니다.", "제 5 조 (회원가입)", "'회원'이 되고자 하는 고객은 회원 가입 신청서에 정해진 사항을 기입한 후, 이 약관과 '개인정보 수집·활용 동의' 기타 동의가 필요한 사항에 동의함으로써 회원가입을 신청합니다. 단, 만 14세 미만의 경우, 법정대리인의 동의를 받아 가입신청을 하여야 하며, 다만 이 경우 관련 법령이나 '회사'의 정책에 따라 법정대리인의 동의여부와 관계없이 가입을 제한하거나 일부 서비스 제공이 불가할 수 있습니다.", "결정 사항 14세 미만 가입 정책은 ① 가입 자체 제한, ② 법정대리인 동의 후 가입 허용 중 회사 정책에 따라 결정합니다. 별첨 가이드 결정 체크리스트 A1 항목을 회신해 주십시오.", "고객으로부터 회원가입 신청이 있는 경우, '회사'는 자체 기준에 따른 심사를 거친 후 고객에게 '회원' 자격을 부여 할 수 있으며 '회원' 자격이 부여된 고객은 당사로부터 가입 완료 고지를 받은 시점부터 회원으로서의 지위를 취득합니다.", "'회사'는 다음 각 호에 해당하는 신청에 대하여는 승낙을 하지 않거나 사후에 이용계약을 해지할 수 있습니다.", "이 약관에 의하여 이전에 회원자격을 상실한 적이 있는 경우", "실명이 아니거나 타인의 명의를 이용한 경우. 단, '등록회원'에 한함", "허위의 정보를 기재하거나, '회사'가 제시하는 내용을 기재하지 않은 경우", "기타 가입신청자의 귀책사유로 인하여 승인이 불가능하거나 '회사'가 정한 제반 사항을 위반하며 신청하는 경우", "제1항에 따른 가입신청에 있어 '회사'는 '회원'의 종류에 따라 전문기관을 통한 실명확인 및 본인인증을 요청할 수 있습니다.", "'회사'는 서비스관련설비의 여유가 없거나, 기술상 또는 업무상 문제가 있는 경우에는 승낙을 유보할 수 있습니다.", "'회사'는 '회원'에 대해 회사정책에 따라 종류별, 등급별로 구분하여 서비스 제공에 차등을 둘 수 있습니다.", "제 6 조 (회원정보의 변경)", "'회원'은 언제든지 본인의 개인정보를 열람하고 수정할 수 있습니다. 다만, 서비스 관리를 위해 필요한 생년월일, 성별 등은 수정이 불가능합니다.", "'회원'은 가입신청 시 기재한 사항이 변경되었을 경우 회원정보 수정을 통해 '회사'에 대하여 그 변경사항을 알려야 하며, 이를 알리지 않아 발생한 불이익에 대하여 '회사'는 책임지지 않습니다.", "제 7 조 (개인정보보호 의무)", "'회사'는 '정보통신망법' 등 관계 법령이 정하는 바에 따라 '회원'의 개인정보를 보호하기 위해 노력합니다. 개인정보의 보호 및 사용에 대해서는 관련법령 및 '회사'의 개인정보처리방침이 적용됩니다.", "제 8 조 ('회원'의 개인정보 관리의무)", "'회원'의 이메일, 휴대전화번호, 기타 '【멤버십 서비스명】' 서비스 이용을 위해 필요한 정보들에 관한 관리책임은 '회원'에게 있으며, 이를 제3자가 이용하도록 하여서는 안 됩니다.", "'회사'는 '회원'의 개인정보 유출 우려가 있는 경우, 해당 '회원'의 '【멤버십 서비스명】' 서비스 이용을 제한할 수 있습니다.", "'회원'은 자신의 정보가 도용되거나 제3자가 사용하고 있음을 인지한 경우 이를 통해 '【멤버십 서비스명】'의 서비스가 부정하게 이용될 가능성이 있는 경우에는 이를 즉시 '회사'에 통지하고 '회사'의 안내에 따라야 합니다.", "'회원'이 '회사'에 제3항 사실을 통지하지 않거나, 통지한 경우에도 '회사'의 안내에 따르지 않아 발생한 불이익 및 '회원'의 개인정보 관리소홀 기타 '회사'의 귀책사유 없이 제3자가 부당하게 '【멤버십 서비스명】'을 이용함으로써 발생된 불이익에 대하여 '회사'는 책임지지 않습니다.", "제 9 조 ('회원'에 대한 통지)", "'회사'가 '회원'에 대한 통지를 하는 경우 이 약관에 별도 규정이 없는 한 '【멤버십 서비스명】' '앱' 내 푸쉬 알림 등으로 할 수 있습니다.", "'회사'는 '회원' 전체에 대한 통지의 경우 7일 이상 '【멤버십 서비스명】' '앱' 혹은 '홈페이지'의 게시판에 게시함으로써 제1항의 통지에 갈음할 수 있습니다.", "'회사'는 '회원'이 '【멤버십 서비스명】' 서비스 이용 중 필요하다고 인정되는 다양한 정보를 공지사항이나 이메일, 문자메시지 등의 방법으로 '회원'에게 제공할 수 있습니다. 단, '회원'은 관련법령에 따른 거래관련 정보 및 고객문의, 휴면회원 전환 등을 제외하고는 언제든지 푸쉬 알림 및 이메일, 문자메시지에 대해서 수신 거절을 할 수 있습니다.", "'회사'가 광고성 정보를 전송하는 경우에는 정보통신망법 제50조에 따라 회원의 사전 동의를 받으며, 야간시간(21:00~익일 08:00) 광고성 정보 전송은 별도 동의를 받은 회원에 한하여 전송합니다.", "제 10 조 ('회원'의 의무)", "'회원'은 관계법령, 이 약관에서 규정하는 사항과 이용안내 또는 '【멤버십 서비스명】'과 관련한 공지사항, 기타 '회사'가 통지하는 사항 등을 준수하여야 하며, '회사'의 업무에 방해되는 행위를 하여서는 안됩니다.", "'회원'은 '회사'가 제공한 '스탬프' 및 '쿠폰' 등을 다른 '회원'에게 재판매하거나 기타 이를 활용하여 영업 활동을 할 수 없으며, 이를 위반할 경우 제공받았던 혜택을 반환하여야 합니다.", "'회원'은 다음 각 호의 행위를 하여서는 안됩니다.", "신청 또는 변경시 허위내용의 등록", "타인의 정보도용", "'회사'가 게시한 정보의 변경", "'회사'와 기타 제3자의 저작권 등 지적재산권에 대한 침해", "'회사' 및 기타 제3자의 명예를 훼손시키거나 업무를 방해하는 행위", "'회사'의 동의 없이 영리를 목적으로 '【멤버십 서비스명】' 서비스를 사용하는 행위", "기타 불법적이거나 부당한 행위", "제 11 조 ('회원' 탈퇴와 '스탬프'의 소멸 처리)", "'회원'은 언제든지 '【멤버십 서비스명】'을 통해 '회원' 탈퇴를 요청할 수 있으며, '회사'는 '회원'의 요청에 따라 조속히 '회원' 탈퇴에 필요한 제반 절차를 수행합니다.", "'회원' 탈퇴 시, 탈퇴 요청일 현재까지 보유한 '스탬프' 및 '쿠폰' 등 '【멤버십 서비스명】'의 '회원'으로서 보유하던 모든 권리는 자동으로 소멸되며 재가입하더라도 복원되지 않습니다. 보유하고 있는 '교환권' 및 잔액이 남아있는 '금액권'의 경우 회원정보에 등록된 휴대폰번호를 기준으로 문자메시지가 자동 발송되며, 이후 미사용 혹은 환불절차 미진행으로 인하여 발생된 손해에 대해 '회사'는 책임을 부담하지 않습니다.", "'회사'는 부정한 목적의 반복적인 탈퇴와 재가입을 막기 위하여, 탈퇴 회원의 재가입을 【재가입 제한 기간】 제한하고 있습니다. 다만, 고객 앱 상에서의 오류 등의 특이사항이 있을 경우 고객센터에서 재가입 기간 제한을 해제할 수 있습니다.", "제 12 조 ('회원' 자격 상실)", "'회원'이 다음 각 호의 사유에 해당하는 경우, '회사'는 당해 '회원'에 대한 통보로써 '회원'의 자격을 즉시 상실시킬 수 있습니다.", "'스탬프'나 '쿠폰'의 '부정 적립 및 이용'이나 '교환권', '금액권'의 '부정 등록 및 이용' 등 '【멤버십 서비스명】' 서비스를 '회사'가 예정한 방법 또는 목적을 벗어나 이용한 경우", "다른 '회원'의 서비스 이용을 방해하거나 그 정보를 도용하는 경우", "'회사' 또는 다른 '회원'의 명예를 훼손하거나 모욕하는 경우 기타 권리를 침해하는 경우", "회원이 사망한 경우", "이 약관 및 관계법령이 금지하거나 사회상규에 반하는 행위를 하는 경우", "최종 서비스 이용일로부터 【휴면 기준 기간】 이용 내역이 없을 경우(정보통신망법 기타 관련 법령에 근거함)", "기타 '【멤버십 서비스명】'의 정상적인 운영을 방해한 경우", "제11조 제2항 및 동조 제3항은 전항에 따라 '회원' 자격이 상실된 경우에도 준용됩니다. 단, 제11조 제2항 후문은 '회원'이 적법하게 보유한 것이라고 인정되는 경우에 한하여 준용됩니다.", "전항에도 불구하고 제1항 제4호로 '회원'의 자격이 상실된 경우, '회원'이 보유하고 있던 모든 권리는 소멸하며 상속되지 않습니다.", "제1항 각 호의 경우 '회사'는 '회원'의 자격을 즉시 상실시키지 않고 해당 '회원'에 대한 '【멤버십 서비스명】' 서비스 제공을 일시 중단시킬 수 있습니다.", "제 13 조 (권리의 귀속)", "'【멤버십 서비스명】'에 대한 저작권 및 지식재산권 기타 권리는 '회사'에 귀속됩니다.", "제 14 조 ('【멤버십 서비스명】' 서비스의 중단)", "'회사'는 다음 각 호의 사유가 발생한 경우 '【멤버십 서비스명】' 서비스 이용을 일시적으로 중단할 수 있습니다.", "'【멤버십 서비스명】' 서비스용 설비 점검, 보수 또는 공사로 인하여 부득이한 경우", "전기통신사업법에 규정된 기간통신사업자가 전기통신 서비스를 중지했을 경우", "기기·기술적 결함이나 네트워크의 오류 및 장애가 발생한 경우", "국가비상사태, 서비스 설비의 장애 또는 서비스 이용의 폭주 등으로 서비스 이용에 지장이 있는 경우", "기타 중대한 사유로 인하여 '회사'가 서비스 제공을 지속하는 것이 부적당하다고 인정하는 경우", "'회사'는 전항의 규정에 의하여 '【멤버십 서비스명】' 서비스의 이용을 중단하는 때에는 그 사유 및 중단기간 등을 '회원'에게 공지합니다. 다만, '회사'가 사전에 통지할 수 없는 부득이한 사유가 있는 경우 사후에 통지할 수 있습니다.", "'회사'는 '【멤버십 서비스명】' 서비스의 제공에 필요한 경우 정기점검을 실시할 수 있으며, 정기점검시간은 '회사'가 공지한 바에 따릅니다.", "제1항에 따른 서비스 제한 또는 중지로 인하여 일시적으로 '스탬프'를 적립하지 못한 경우는 서비스 이용이 정상화되면 추후 적립이 가능합니다. 다만 영수증 등 기타 '회사'가 '스탬프' 적립대상인지 여부를 판단할 수 있는 증빙을 보유하고 있는 경우에 한합니다.", "제 15 조 ('【멤버십 서비스명】' 서비스의 변경)", "'회사'는 상당한 이유가 있는 경우에 운영상, 기술상의 필요에 따라 제공하고 있는 전부 또는 일부 '【멤버십 서비스명】' 서비스를 변경할 수 있습니다.", "서비스의 내용, 이용방법, 이용시간에 대하여 변경이 있는 경우에는 변경사유, 변경될 서비스의 내용 및 제공일자 등은 그 변경 전에 '홈페이지' 또는 '앱'을 통해 고지합니다.", "'회사'는 '【멤버십 서비스명】' 서비스 중 '스탬프' 적립 및 '스탬프쿠폰' 발행 및 사용 등 무료로 제공되는 서비스의 일부 또는 전부를 '회사'의 정책 및 운영의 필요상 수정, 중단, 변경할 수 있으며, 이에 대하여 관련법에 특별한 규정이 없는 한 '회원'에게 별도의 보상을 하지 않습니다.", "제 16 조 (책임제한)", "'회사'는 천재지변 또는 이에 준하는 불가항력으로 인하여 '【멤버십 서비스명】' 서비스를 제공할 수 없는 경우에는 서비스 제공에 관한 책임이 면제됩니다.", "'회사'는 '회원'의 귀책사유로 인한 '【멤버십 서비스명】' 서비스 이용의 장애에 대하여는 책임을 지지 않습니다.", "'회사'는 '회원'이 '【멤버십 서비스명】' 서비스와 관련하여 게재한 정보, 자료, 사실의 신뢰도, 정확성 등의 내용에 관하여는 책임을 지지 않습니다.", "'회사'는 '회원'간 또는 '회원'과 제3자 상호간에 '【멤버십 서비스명】' 서비스를 매개로 하여 거래 등을 한 경우에는 그로 인해 발생되는 문제에 대해 책임을 지지 않습니다.", "전항에도 불구하고 '회사'의 고의 또는 중과실로 인하여 발생한 손해에 대해서는 그러하지 아니합니다.", "제 17 조 (분쟁 해결)", "'회사'는 '회원'에게 손해가 발생하거나 '회사'와 '회원'간 분쟁이 발생하는 경우, 손해배상 등 분쟁처리를 위해 다음과 같이 고객센터를 설치, 운영합니다.", "【멤버십 고객센터 명칭】: 【고객센터 번호】", "【모바일상품권 고객센터 명칭】: 【모바일상품권 고객센터 번호】", "'회사'는 '회원'이 제기한 의견을 신속히 처리합니다. 단, 신속한 처리가 곤란한 경우에는 '회원'에게 그 사유와 처리일정을 즉시 통보합니다.", "'회사'와 '회원'간에 발생한 분쟁이 원만히 해결되지 않는 경우, 관련 법령에 따라 '소비자보호법'에 따른 한국소비자원의 소비자분쟁조정위원회를 통해 조정신청이 가능합니다.", "제 18 조 (관할 법원)", "'회사'와 '회원' 간의 분쟁 및 소송은 대한민국법을 준거법으로 합니다.", "이 약관과 관련한 제반 분쟁 및 소송은 민사소송법상의 관할 법원을 제1심 관할 법원으로 합니다.", "해외에 주소나 거소가 있는 '회원'의 경우 '회사'와 '회원'간 발생한 분쟁에 관한 소송은 전항에도 불구하고 【해외거주 회원 관할 법원】을 관할법원으로 합니다.", "제 19조 (회원의 종류 및 등급)", "'회원'은 가입형태에 따라 다음과 같이 나뉘어집니다.", "비회원: '앱'을 통한 회원가입 없이, 휴대폰번호를 이용하여 '스탬프' 적립을 1회 이상 한 무기명 고객으로, 비회원은 '스탬프'의 적립만 가능하므로, 적립된 '스탬프'의 확인 및 '스탬프쿠폰'의 발행 및 사용 등을 하기 위해서는 '회원'으로 가입을 하여야 합니다.", "회원: '앱'을 통한 가입 후 '회사'가 제공하는 방법에 따른 실명인증 절차를 거쳐 본인임이 확인된 고객으로서, 이 상태에서는 '회사'가 제공하는 '【멤버십 서비스명】'의 모든 서비스를 제공받을 수 있습니다. 2023년 9월 15일 개인정보보호법 개정으로 관련법 제 39조의6(개인정보의 파기에 대한 특례) 조항 삭제가 시행됨에 따라 【휴면 기준 기간】 서비스 이용 기록이 없는 고객의 경우에도 '회원'으로 정의되며 운영 정책에 동의하지 않으실 경우 '회원 탈퇴'를 진행하실 수 있습니다.", "제 20 조 ('스탬프' 적립 및 '쿠폰'의 발행과 사용)", "'회원'은 다음 각 호와 같이 '【멤버십 서비스명】'을 통해 '스탬프'를 적립함으로써, '쿠폰'을 발행하고 사용할 수 있습니다.", "'매장'에서 【스탬프 적립 대상】 구매 시 한 잔당/한 건당 한 개의 '스탬프'가 발행되며, '스탬프' 【적립 기준수량】 적립 시 '【시그니처 무료교환권 명칭】(이하 '스탬프쿠폰'이라고 함)'이 발행됩니다. 단, 비회원의 경우에는 '회원'이 되어야만 '스탬프쿠폰'을 사용하실 수 있으며, 비회원(무기명) 상태에서 스탬프 적립은 【비회원 스탬프 유효기간】이 지나면 불가합니다.", "제1호 단서의 '스탬프쿠폰'을 활성화하기 위한 절차는 최초 적립한 '스탬프'의 유효기간이 경과하기 전에 하여야 하며, '스탬프쿠폰' 발행 익일부터 사용이 가능합니다.", "'스탬프쿠폰'을 사용하여 '매장'의 【상품 카테고리】를 제공받는 경우에는 '스탬프'가 적립되지 않습니다.", "'스탬프'의 유효기간은 적립일 포함 【스탬프 유효기간】이며 해당 기간이 경과한 '스탬프'는 소멸됩니다. '회원'은 유효기간 내에 '스탬프' 【적립 기준수량】을 적립하면 '스탬프쿠폰'이 발행되며, 유효기간이 지난 '스탬프'는 유효기간 연장 및 재발행이 불가합니다.", "'스탬프쿠폰'의 유효기간은 발행일 포함 【쿠폰 유효기간】이며, 해당 기간이 경과한 '스탬프쿠폰'은 소멸됩니다. 단, 이벤트 쿠폰의 경우 유효기간이 상이할 수 있습니다.", "'회사'는 '스탬프' 및 '쿠폰'의 소멸 예정 30일 전 회원이 수신 동의한 채널(앱푸시·문자·이메일 중)로 사전 통지합니다.", "'스탬프' 적립은 '회원'이 등록한 휴대전화번호 또는 '【멤버십 서비스명】' '앱'으로 가능하며, '스탬프' 적립 및 '쿠폰' 사용 내역은 '앱'에서 확인 가능합니다.", "'스탬프' 적립이 가능한 상품을 구매하였으나 '스탬프' 적립을 하지 못하였을 경우에는 영수증을 지참하여 '결제'한 '매장'에 '결제'시간 포함 48시간 이내에 방문하면 '스탬프' 적립이 가능합니다.", "모든 '쿠폰'은 동일 가격 이상의 타 상품으로 교환 가능하나, 교환하고자 하는 상품이 더 높은 금액일 경우에는 차액을 부담해야 하며, 낮은 금액의 상품을 교환한다 하더라도 차액을 환불하지 않습니다(가격 할인행사로 인한 경우에도 동일합니다). 단, 이 약관에 따라 환불이 되는 경우에는 그러하지 않습니다.", "모든 '쿠폰'은 다른 '쿠폰'과 합산하여 사용할 수 없습니다.", "'쿠폰'은 현금으로 반환되지 않으며, 타인에게 양도할 수 없습니다. 다만, '회사'의 귀책사유로 사용이 불가한 경우에는 그러하지 않습니다.", "'쿠폰'으로 다른 상품권이나 기타 결제가 가능한 유가증권을 교환하거나 구입할 수 없습니다.", "제12조 제1항 각 호의 경우 '회사'는 '스탬프' 및 '쿠폰'의 이용을 제한할 수 있습니다.", "기타 '스탬프' 및 '쿠폰'과 관련된 내용은 '회사'의 정책 기타 사정에 따라 수시 변동될 수 있으며, 구체적인 사항은 '【멤버십 서비스명】' '앱'에서 확인하시기 바랍니다.", "'쿠폰'은 '앱' 화면의 '쿠폰' 바코드를 '매장'에 제시하여 사용하여야 합니다.", "제 21 조 ('교환권' 및 '금액권' 구매 등)", "'교환권'과 '금액권'은 '회원'만 구매 및 선물할 수 있습니다.", "'교환권'과 '금액권'을 구매하는 '회원'이 미성년자인 경우, 법정대리인의 동의를 얻지 못하면 미성년자 본인 또는 법정대리인이 계약을 취소할 수 있으며, 이에 따라 '회사'는 미성년자인 '회원'의 구매시 법정대리인의 동의 여부를 확인하거나 구매를 제한할 수 있습니다.", "'회원'이 '교환권'과 '금액권'을 구매 요청하는 경우, '회사'는 그에 대한 수신확인통지를 하며, 그 통지가 '회원'에게 도달된 때에 계약이 체결된 것으로 봅니다. 만약 '회원'이 수신확인통지를 받은 후 해당 내용에 불일치가 있는 경우에는 '회사'에게 그 변경 및 취소를 요청할 수 있고, '회사'는 지체 없이 그 요청에 따라 처리합니다. 다만 이미 결제를 한 경우에는 제24조에 따라 구매취소를 할 수 있습니다.", "'교환권'과 '금액권'의 구매가격은 다음 각 호와 같습니다.", "'금액권'은 【금액권 단위】로 구성되어 있습니다.", "'교환권'은 구매하고자 하는 제품별로 쿠폰의 가격이 결정됩니다.", "'교환권'과 '금액권' 구매 시 결제수단은 다음 각 호와 같습니다.", "'교환권'과 '금액권'은 신용(체크)카드, 휴대폰 소액결제, 간편결제를 통해 결제할 수 있습니다.", "제1호의 결제수단은 '회사'의 정책에 따라 변경될 수 있습니다.", "'교환권'과 '금액권' 구매 시 현금영수증은 발행이 불가하며, 해당 '교환권'과 '금액권'을 사용하여 '상품'을 구매할 경우 해당 구매금액만큼의 현금영수증 발행이 가능합니다.", "'교환권'과 '금액권'의 유효기간은 다음 각 호와 같습니다.", "'금액권'의 유효기간은 최초 구매일 포함 【금액권 유효기간】이며, 유효기간 내 연장 신청 시 【연장 단위】씩 연장이 가능합니다. 최초 구매일자로부터 상법상 상사채권 소멸시효 5년 경과 시 해당 금액권이 소멸됩니다.", "'교환권'의 유효기간은 구매일 포함 【교환권 유효기간】이며, 유효기간 내 연장 신청 시 【연장 단위】씩 연장이 가능합니다. 최초 구매일자로부터 5년 경과 시 소멸시효기간이 도래되어 해당 쿠폰이 소멸됩니다.", "제22조 '선물하기'를 통해 '수신자'에게 발송된 '교환권' 및 '금액권'의 유효기간은 '수신자'의 수신일로부터 기산합니다.", "이벤트로 '회사'에서 발행한 '교환권' 또는 '금액권'은 제1 내지 2호에서 정한 유효기간과 다를 수 있으며, 환불, 통합, 유효기간 연장이 불가합니다.", "유효기간 도래 전 '회사'는 푸쉬 알림 및 문자메시지 등의 수단을 이용하여 '회원'에게 '교환권' 및 '금액권'의 유효기간 만료 안내를 만료 30일/14일/7일 이전에 사전 통지합니다.", "유효기간 도래 전 유효기간 연장신청을 하였음에도 불구하고 '회사'의 사정으로 연장을 처리할 수 없는 경우에는 해당 '교환권' 혹은 '금액권'의 구매금액 전액을 환불합니다.", "'교환권'과 '금액권'의 이용조건은 다음 각 호와 같습니다.", "'금액권'은 모바일 상품권의 형태로, '회원'이 이용할 수 있는 금액은 구매한 금액과 동일하며, 만약 '상품'을 구매하고자 할 때 '금액권'의 잔액이 부족한 경우 다른 결제수단(현금, 카드, 쿠폰 등)과 복합결제가 가능합니다.", "'교환권'은 물품제공형 모바일 쿠폰의 형태로, 수신자는 '매장'에서 해당 '교환권'에 표기된 '상품'과 동일한 '상품'을 교환할 수 있습니다. 다만 수신자는 해당 '상품'과 동일한 금액의 다른 '상품'으로 교환할 수 있으며, 해당 금액을 초과하는 '상품'으로 교환하는 경우 다른 결제수단(현금, 카드, 금액권 등)을 통해 초과되는 금액을 지불하여 사용할 수 있습니다.", "'회원'은 '매장'에서 판매하는 '상품' 등에 대하여 가격 할인기간을 포함하여 언제든지 '교환권'과 '금액권'을 사용할 수 있습니다. 다만, '교환권' 및 '금액권'으로 모바일 상품권 등 기타 유가증권을 구매할 수 없으며, '회사'가 사전에 '앱'에 고지한 모바일 상품권 사용 불가 매장 또는 특정 상품 등에 대하여는 사용이 제한될 수 있습니다.", "'회원'이 '매장 및 【픽업오더 서비스명】(APP)'에서 '교환권' 혹은 '금액권'으로만 '상품' 결제 시 '스탬프'를 적립 받을 수 없습니다. 다만 '스탬프' 적립 대상이 아닌 '상품'이나 '매장'의 경우와 이벤트로 '회사'에서 발행한 '교환권' 또는 '금액권'으로 구매하는 경우는 적립이 불가합니다.", "'회원'이 보유하고 있던 '교환권' 및 '금액권'을 삭제하고자 하는 경우에는 제25조에 따라 환불절차를 거쳐야 합니다.", "'교환권'과 '금액권'은 '앱' 화면의 바코드를 '매장'에 제시하여 사용하여야 합니다.", "'회사'는 다음 각 호에 해당하는 경우 '교환권' 또는 '금액권'의 전부 또는 일부에 대해 사용을 제한하거나 중지시킬 수 있습니다.", "'회사'가 제공하는 방식이 아닌 불법 또는 부정한 방법으로 '교환권'이나 '금액권'을 구매하거나 등록하여 사용하고자 하는 경우", "타인의 명의를 도용한 결제수단을 통하여 송신된 '교환권'이나 '금액권'을 사용하고자 하는 경우", "제12조 제1항 각 호의 경우", "기타 천재지변, 국가비상사태 등 불가항력적 사유가 있는 경우", "제 22 조 (선물하기 및 거절)", "'회원'은 '앱'을 통해 '교환권'이나 '금액권'을 자신이 원하는 대상에게 선물을 할 수 있습니다(이하 '선물하기'라 합니다). 단, 자신이 '선물하기'를 통해 받은 '교환권'이나 '금액권'은 또다시 '선물하기'를 할 수 없습니다.", "'회원'은 자신의 휴대전화에 등록된 연락처를 선택하여 '선물하기'의 대상(이하 '수신자')을 지정할 수 있습니다.", "선물은 '수신자'의 '【멤버십 서비스명】' '회원' 여부와 무관하게 '수신자'의 휴대전화번호로 문자메시지 형태로 발송됩니다.", "번호도용 문자차단 서비스나 휴대폰 번호 도용방지 서비스에 가입된 휴대폰은 송·수신이 불가할 수 있으며, 기타 '수신자'로 지정한 고객의 단말기 설정에 따라 문자메시지 수신이 불가능한 경우 '교환권' 및 '금액권'을 받지 못할 수 있습니다. 이 경우 이로 인해 발생된 문제에 대해서는 '회사'가 책임지지 않습니다.", "'수신자'의 지정은 '선물하기' 기능을 이용하는 '회원' 본인의 책임하에 이루어지며, '수신자'의 오지정, 휴대전화번호 오류 등으로 인하여 발생된 문제에 대해 '회사'는 책임을 지지 않습니다.", "선물한 '교환권' 및 '금액권'은 동일한 휴대폰 번호로 문자메시지 1회 재전송이 가능하며, 모바일 상품권 고객센터를 통해서만 가능합니다.", "'수신자'가 수령한 '교환권' 및 '금액권'은 '매장'에 제시하여 '상품'을 교환 혹은 구매할 수 있습니다.", "'회원'은 '선물하기' 서비스를 상업적으로 이용할 수 없으며, '【멤버십 서비스명】' 서비스에서 제공된 '선물하기' 기능이 아닌 다른 방식으로 전달된 '교환권' 혹은 '금액권'의 이용으로 인해 발생된 문제에 대해서는 '회사'는 책임을 지지 않습니다.", "제 23조 (소멸시효)", "'교환권' 및 '금액권'을 구매한 날로부터 5년이 경과하면 상법상의 상사채권소멸시효가 완성되어 '회원'은 물품 등의 제공, 환불 및 잔액반환을 요청할 수 없습니다.", "제 24 조 (구매취소 및 청약철회)", "'교환권' 및 '금액권'을 구매한 '회원'은 다음 각 호에 따라 결제한 금액 전부를 환불받을 수 있습니다.", "결제일·재화 수령일로부터 7일 이내인 경우, 단순 변심에 의한 청약철회가 가능합니다(전자상거래법 제17조 제1항).", "표시·광고 내용과 다르거나 계약 내용과 다르게 이행된 경우, 재화 수령일로부터 3개월 이내 또는 사실을 안 날부터 30일 이내에 청약철회가 가능합니다(전자상거래법 제17조 제3항).", "유효기간 내 사용·선물 등으로 사용 처리되지 않은 경우 미사용 환불이 가능합니다.", "다음 각 호의 경우에는 청약철회·구매취소가 제한될 수 있습니다.", "구매자 혹은 '선물하기'를 한 이후 '수신자'가 해당 '교환권'이나 '금액권'을 사용한 경우('상품'을 교환 또는 구매한 경우)", "기타 전자상거래법 제17조 제2항에서 정한 청약철회 제한 사유에 해당하는 경우", "환불은 구매 시 결제한 수단에서 제공되는 환불절차 및 약관에 따라 청약철회·구매취소 후 3영업일 이내에 처리됩니다. 다만 PG사·카드사 정책에 따라 실제 환급 시점은 다를 수 있으며, '회사'의 귀책으로 환급이 지연되는 경우 전자상거래법 제18조 제2항에 따른 지연이자를 가산합니다.", "결제수단이 휴대폰 소액결제이고, 취소요청일이 구매한 날이 속한 월의 익월인 경우에는 '회사'는 '회원'이 지정한 환불계좌를 통해 별도로 환불처리를 합니다.", "'수신자'는 전항에 따른 구매취소를 할 수 없고, 구매한 '회원'에게 전액 환불됩니다.", "제 25 조 (환불)", "'회원'이 '금액권' 잔액의 환불을 요청하는 때에는 다음 각 호에 의거하여 환불 처리를 합니다.", "유효기간이 만료되지 않은 경우, 최종 시점의 잔액을 기준으로 【잔액 환불 기준】 사용 시 남은 잔액을 환불 대상 금액으로 합니다.", "유효기간이 만료된 경우, 잔액의 【만료시 환불율】에 해당하는 금액을 환불처리 합니다.", "소멸시효 기한(5년) 도래 시 해당 카드가 소멸되며 환불이 불가합니다.", "'회원'이 미사용 '교환권'의 환불을 요청하는 때에는 다음 각 호에 의거하여 환불 처리를 합니다.", "유효기간이 만료되지 않은 경우 100% 환불이 가능합니다.", "유효기간 만료시 또는 소멸시효 기간 도래시의 경우 제1항 제2호 내지 3호를 준용합니다.", "본 조에 따른 환불신청은 '교환권'이나 '금액권'의 구매자('선물하기'의 경우 최초 '선물한 자')가 할 수 있습니다.", "본 조에 따른 환불신청은 【모바일상품권 고객센터 번호】를 통해 환불 가능합니다.", "본 조에 따른 환불 신청 시, '회사'는 환불신청자의 본인확인 절차를 거친 후 해당 신청자가 지정한 계좌로 신청일 기준 7영업일 이내에 환불금을 입금해 드립니다. 이 경우 본인의 환불 계좌를 잘못 지정하는 경우에는 확인 절차 등으로 인해 환불이 다소 지연될 수 있습니다.", "프로모션 또는 이벤트 목적으로 '회사'가 발행한 '교환권' 및 '금액권'의 경우 환불이 불가합니다.", "제 26 조 (책임 소재)", "'회사'는 '회원'이 '교환권' 및 '금액권'의 '선물하기' 서비스 이용 중 발생한 손해에 대하여 배상할 책임을 집니다. 단, 본 약관에 별도 명시된 경우 혹은 다음 각호에 해당하는 경우는 '회사'가 책임을 부담하지 않습니다.", "'교환권' 및 '금액권'을 '회사'가 지정하지 아니한 방법으로 불법 거래 또는 위/변조 등 '부정이용'된 경우", "'교환권' 및 '금액권'을 도난 당하거나 분실한 경우", "제3자가 권한 없이 '회원'의 '교환권' 및 '금액권'을 이용할 수 있음을 알았거나 쉽게 알 수 있었음에도 불구하고 '회원'이 자신의 '교환권' 및 '금액권' 정보(PIN 번호 포함)를 누설 또는 노출하거나 방치한 경우", "기타 '회원'의 고의·과실로 인하여 오전송 되거나 '부정이용'된 경우.", "회원이 본 조 제1항에서 규정한 행위를 하여 '회사'에 손해가 발생하는 경우, 해당 '회원'은 '회사'의 손해에 대하여 배상할 책임을 집니다.", "'회사'는 천재지변 등 이에 준하는 불가항력으로 인하여 '【멤버십 서비스명】' 서비스를 제공할 수 없거나 '교환권' 또는 '금액권'을 사용할 수 없는 경우, 기타 '회사'의 귀책사유가 없는 경우에는 이에 대한 책임을 지지 않습니다. 또한 '회사'는 서비스 이용과 관련하여 '회원'의 고의 또는 과실로 인하여 발생한 손해에 관하여도 책임을 지지 않습니다.", "제 27 조 ('【픽업오더 서비스명】' 서비스의 내용)", "'회사'는 다음 각 호와 같은 형태의 '【픽업오더 서비스명】' 서비스를 제공합니다.", "'앱'을 통한 주문 및 결제 서비스", "'앱'을 통하여 '회원'과 '회사'('매장'을 포함하며, 이하 이 장에서 같습니다)' 간에 '상품' 매매가 이루어질 수 있도록 온라인 거래 서비스를 제공합니다.", "위치정보(GPS)를 기반으로 '매장'의 주문 가능 메뉴를 실시간으로 확인하여 온라인으로 주문을 할 수 있습니다.", "연관 문서 위치정보 GPS 사용에 따라 별도의 '위치기반서비스 이용약관'(#03)을 마련하고, 회원가입·앱 최초 실행 시 위치정보 수집·이용 동의를 받아야 합니다.", "제 28 조 ('【픽업오더 서비스명】' 서비스 이용)", "'【픽업오더 서비스명】' 서비스는 '회원'에게만 제공됩니다.", "'【픽업오더 서비스명】' 서비스의 제공은 연중무휴를 원칙으로 합니다. 다만 '매장'의 운영시간과 동일하게 제공됩니다. '매장' 별 운영시간이 상이하므로 해당 매장의 운영 시간을 미리 확인 후 서비스를 이용하여야 합니다.", "'【픽업오더 서비스명】'로 주문을 한 이후라도, 해당 '상품'의 원부재료 품절 또는 기기고장, 기타 해당 '매장'의 사유 등으로 인하여 주문이 취소될 수 있습니다. 이 경우 '매장'에서 해당 사유가 포함된 주문 취소 내용이 푸쉬 알림되며, '회원'은 '【픽업오더 서비스명】' 서비스의 [주문 내역 확인] 페이지에서 확인할 수 있습니다.", "'【픽업오더 서비스명】'로 주문을 한 이후 '매장'은 해당 주문을 접수합니다. 만약 '매장'이 【주문 자동취소 시간】 접수를 하지 않을 경우 주문 및 결제는 자동으로 취소됩니다.", "일부 '매장'에서는 '【픽업오더 서비스명】'를 통한 주문이 불가하며, 구체적인 내용은 '앱'에 공지합니다.", "제 29 조 (결제 및 주문 취소 등)", "'회원'은 '【픽업오더 서비스명】' 서비스 내 '상품'을 선택하여 주문하기를 함으로써 구매를 신청하며, 이에 따른 '회원'의 결제 의사표시에 대해 '회사'가 주문 승인을 통해 승낙의 의사표시를 함으로써 '회사'와 회원 사이에 메뉴 주문에 대한 매매계약이 성립합니다.", "'회사'는 전항의 구매신청에 대해 다음 각 호에 해당하면 승낙하지 않을 수 있습니다.", "'【픽업오더 서비스명】'로 주문이 불가능한 '상품'이거나 '매장'을 선택한 경우", "신청 내용에 허위, 기재누락, 오기가 있는 경우", "상행위(재판매)를 목적으로 구매하는 거래이거나, 거래 정황상 상행위(재판매)를 목적으로 한 구매라고 판단되는 경우", "구매 신청을 승낙하는 것이 회사의 기술상 현저히 지장이 있다고 판단되는 경우", "미성년자의 구매신청으로서 법정대리인의 동의가 없는 경우", "기타 '회원'의 귀책사유로 승인이 불가능하다고 판단되는 경우", "'회원'은 제1항 '회사'의 수신확인통지를 받은 경우 의사표시의 불일치 등이 있는 경우에는 수신확인통지를 받은 즉시 구매신청 변경 및 취소를 요청할 수 있고, '회사'는 가능한 해당 요청을 수용합니다. 다만, 결제를 한 이후에는 본조 제7항에 따라 구매변경 및 결제취소가 불가할 수 있습니다.", "'【픽업오더 서비스명】' 서비스의 결제에 따른 대금 지급 방법은 다음 각호의 방법 중 가용한 방법으로 할 수 있습니다.", "신용/체크카드", "간편결제", "'교환권' 및 '금액권'", "쿠폰함에 등록된 '쿠폰'", "휴대폰 소액결제", "'회원'은 전항에 따른 결제시 반드시 본인 명의의 결제 수단을 이용하여야 하며, 타인의 결제 수단을 임의로 이용하여서는 안됩니다. 타인의 결제 수단을 임의 이용함으로써 발생하는 '회사', 결제 수단의 적법한 소유자, 결제 관련 제3자의 손실과 손해에 대한 책임은 '회원'에게 있습니다.", "'회사'는 '상품' 등의 결제취소 및 환불과 관련하여 전자상거래법 등 관계법령을 준수합니다.", "'회원'의 '【픽업오더 서비스명】' 주문에 따라 개별적으로 제조되는 '상품'의 경우 '매장' 접수 이후에는 전자상거래법 등 관계법령에 따라 결제취소가 제한될 수 있습니다. '회사'는 결제취소가 제한된다는 사실을 결제 화면 등에서 고지합니다.", "결제 이후 결제수단의 변경은 '상품'을 구매한 당해 '매장'에서 구매취소 및 재결제 절차를 통해 가능하며, 반드시 해당 영수증을 소지하고 결제일 포함 3일 이내에 해당 '매장'에 방문하여야 합니다.", "'회원'이 '【픽업오더 서비스명】'를 통해 주문한 '상품'이 제조완료된 경우 해당 '매장'은 '회원'에게 푸쉬 알림을 통해 제조완료 및 픽업요청을 통지합니다. '매장'은 최초 픽업요청 시점으로부터 【보관 시간】까지 '상품'을 보관하며 이후 폐기합니다. '회원'이 '매장'의 제조완료 및 픽업요청에도 불구하고 '상품'을 미수령할 경우 '상품'에 대한 재제공 혹은 환불(결제취소)은 받아들여지지 아니할 수 있으며 이로 인하여 '회원'에게 발생하는 손해에 대하여 '회사'는 고의 또는 과실이 없는 한 책임을 부담하지 않습니다.", "부칙", "본 약관은 【시행일자】부터 시행합니다."]},
     {"n": "개인정보 처리방침", "s": "어떤 정보를 왜 수집하고 얼마나 보관·언제 파기하는지 고지하는 법정 필수 문서.", "full": ["[표준 참고자료 #02]", "개인정보 처리방침", "표준 참고자료 — 멤버십 모바일앱 처리방침", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "【회사명(법인 정식 명칭)】(이하 '회사')은 고객의 개인정보를 보호하기 위하여 항상 최선을 다해 노력하고 있으며, 개인정보보호 관련 주요 법률인 「개인정보보호법」을 비롯한 모든 개인정보보호 관련 법률 규정을 준수하고 있습니다.", "'회사'는 고객의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 이용자의 고충을 원활하게 처리할 수 있도록 개인정보처리방침을 제정하여 이를 준수하고 있으며, 이를 홈페이지 및 모바일 어플리케이션에 공개하고 있습니다.", "1. 총칙", "개인정보란 생존하는 개인에 관한 정보로서 성명, 주민등록번호 등의 사항에 의하여 개인을 식별할 수 있는 정보(당해 정보만으로는 특정 개인을 식별할 수 없더라도 다른 정보와 용이하게 결합하여 식별할 수 있는 것을 포함)를 말합니다.", "'회사'는 고객의 개인식별이 가능한 개인정보를 수집하는 때에는 반드시 동의를 받고, 이용하는 서비스의 형태에 따라 개인정보를 수집 및 이용, 제공, 파기하고 있습니다. 단, 동의를 거부하는 경우 '회사' 서비스의 전부 또는 일부 이용이 제한될 수 있습니다.", "'회사'는 관련 법률 및 지침의 변경, 또는 내부 개인정보 운영방침의 변경에 따라 개인정보처리방침을 개정할 수 있으며, 개정하는 경우 시행일자 등을 부여하여 개정된 내용을 확인할 수 있도록 홈페이지를 통하여 공지합니다.", "2. 수집하는 개인정보의 항목", "'회사'는 다양한 서비스 제공을 위하여 아래와 같은 고객 정보를 수집하고 있습니다. 만 14세 미만 아동은 법정대리인(부모 등)의 동의를 받아야 회원 가입이 가능하며, 법정대리인의 동의를 얻기 위하여 법정대리인의 성명, 이메일 등 필요한 최소한의 정보를 요구할 수 있습니다.", "홈페이지", "고객상담 필수항목: 이름, 휴대폰번호, 이메일", "【부가상담 항목 — 예: 가맹상담, 채용신청 등 — 있는 경우만 기재】", "【멤버십 서비스명】", "필수항목: 성명, 휴대폰번호, 생년월일, 성별, 이메일, 닉네임", "만 14세 미만의 경우: 법정대리인의 성명, 생년월일, 성별, 휴대폰번호", "비회원의 경우: 휴대폰번호", "교환권, 금액권 선물의 경우: 수령인 성명, 수령인 휴대폰번호", "선택항목: 앱푸쉬 수신동의여부, 위치정보 수집동의여부", "서비스 이용 또는 사업처리 과정에서 생성/수집되는 정보: 서비스 이용기록, 접속로그, 쿠키, 접속IP정보, 결제기록, 이용정지기록, 스탬프 적립기록, 단말기 제조사, 모델명, OS버전정보, push 수신 기록, 모바일 광고식별자(IDFA·ADID)", "마케팅 정보 활용 동의 시(선택동의): 휴대폰번호, 생년월일, 성별, 이메일 — 동의하지 않을 경우 회원가입 시 수집한 개인정보를 광고성 정보 전송 목적으로 활용하지 않습니다.", "ATT·광고식별자 안내 iOS는 App Tracking Transparency(ATT) 동의 화면을 통해, Android는 광고ID 설정을 통해 광고식별자 수집을 허용·거부할 수 있습니다. 거부 시에도 서비스 이용에는 제한이 없으며, 맞춤형 광고가 비식별 광고로 대체됩니다.", "3. 개인정보의 처리 목적", "'회사'는 수집한 개인정보를 다음의 목적을 위해 활용합니다. 고객이 제공한 모든 정보는 아래 목적에 필요한 용도 이외로는 사용되지 않으며, 변경될 경우 변경 내용을 고지합니다.", "회원 서비스 이용에 따른 본인 식별 및 실명 여부, 중복 가입 여부 확인", "만 14세 미만 아동에 개인정보 수집에 대한 법정대리인 동의 확인", "고객 고충 및 불만에 대한 처리", "개인정보 침해 사고에 대한 대비, 분쟁 조정을 위한 기록 보존", "신제품 출시 및 이벤트 정보 등의 안내", "마케팅, 홍보 등을 위한 고객분석, 편의성 제공", "상품 구매에 대한 결제, 신규 서비스 개발 및 맞춤 서비스 제공", "통계 데이터 분석에 따른 추천 서비스 제공", "【고객사 부가 목적 — 가맹 상담, 채용 등 — 있는 경우만 기재】", "물품배송 및 불만처리", "취소/반품 시 환불 처리", "개인소득공제용 현금영수증 신청", "4. 개인정보의 처리 및 보유기간", "'회사'는 고객의 개인정보를 원칙적으로 개인정보의 수집 및 이용목적이 달성하게 되는 경우 즉시 삭제합니다. 단, 정보주체로부터 사전에 동의를 받은 경우 또는 상법 등 관련 법령에 의하여 보존할 필요성이 있는 경우 다음의 경우에는 개인정보를 일정기간 동안 보유하며, 무분별한 회원탈퇴와 재가입으로 인한 피해 최소화, 회원탈퇴 후 변심에 의한 민원처리 등을 처리하기 위하여 회원탈퇴 후 30일간 회원정보 보유합니다.", "상법 및 전자상거래 등에서 소비자보호에 관한 법률 등 관련 법령의 규정에 의하여 일정기간 보유해야 할 필요가 있는 경우", "대금결제 및 재화 등의 공급에 관한 기록: 5년 (전자상거래등에서의 소비자보호에 관한 법률)", "회원의 불만 및 분쟁처리에 관한 기록: 3년 (전자상거래등에서의 소비자보호에 관한 법률)", "표시/광고에 관한 기록: 6개월 (전자상거래등에서의 소비자보호에 관한 법률)", "신용정보의 수집/처리 및 이용 등에 관한 기록: 3년 (신용정보의 이용 및 보호에 관한 법률)", "통신사실확인자료(로그기록): 3개월 (통신비밀보호법)", "【회사명】 및 제휴사가 필요에 의하여 별도로 동의를 득한 경우: 별도로 동의를 득한 범위 및 이용 기간 내 보관", "5. 개인정보 수집 동의 거부", "고객은 개인정보 수집 및 이용에 대한 동의를 거부할 권리가 있으며, 동의를 거부할 경우 받는 별도의 불이익은 없습니다. 단, 필수동의 사항에 동의를 거부할 경우, 서비스 이용이 불가능하거나, 서비스 이용 목적에 따른 서비스 제공에 제한이 따르게 됩니다.", "또한, 선택동의 사항에 동의를 거부할 경우, 선택동의 개인정보 항목을 이용하여야 제공받을 수 있는 서비스의 전부 또는 일부 이용이 제한될 수 있습니다.", "6. 회원 및 법정대리인의 권리와 그 행사 방법", "회원 및 법정대리인은 언제든지 등록되어 있는 자신 혹은 당해 만 14세 미만 아동의 개인정보를 조회하거나 수정할 수 있으며, '회사'의 개인정보 처리에 동의하지 않는 경우 동의를 거부하거나 가입해지(회원탈퇴)를 요청하실 수 있습니다.", "회원 혹은 만 14세 미만 아동의 개인정보 조회, 수정을 위해서는 '개인정보변경'(또는 '회원정보수정' 등)을, 가입해지(동의철회)를 위해서는 '회원탈퇴'를 클릭하여 탈퇴가 가능합니다.", "혹은 개인정보보호 담당자 전화 또는 이메일로 연락하시면 요청 접수일로부터 10일 이내에 조치하겠습니다.", "이용자가 개인정보의 오류에 대한 정정을 요청하신 경우에는 정정을 완료하기 전까지 당해 개인정보를 이용 또는 제공하지 않습니다. 또한 잘못된 개인정보를 제3자에게 이미 제공한 경우에는 정정 처리 결과를 제3자에게 지체 없이 통지하여 정정이 이루어지도록 하겠습니다.", "'회사'는 이용자 혹은 법정대리인의 요청에 의해 해지 또는 삭제된 개인정보는 '개인정보의 보유 및 이용기간'에 명시된 바에 따라 처리하고 그 외의 용도로 열람 또는 이용할 수 없도록 처리하고 있습니다.", "정보주체는 위 권리 외에도 개인정보의 처리정지를 요청할 수 있으며(개인정보보호법 제37조), 손해를 입은 경우 손해배상(법정손해배상 300만원 이하 포함)을 청구할 수 있습니다(개인정보보호법 제39조·제39조의2).", "정보주체가 대리인을 통해 위 권리를 행사하는 경우에는 위임장과 본인확인서류(주민등록증·운전면허증 등)를 첨부하여 서면, 전자우편, 모사전송(FAX) 등을 통하여 회사에 제출하여야 합니다.", "동의철회, 가입해지(회원탈퇴) 처리 방법", "【부가 채널 — 예: 가맹 상담 철회 등】: 【전화/이메일】", "【멤버십 서비스명】 탈퇴: 서비스접속 → 회원로그인 → 내정보 → 회원탈퇴", "7. 개인정보 열람 및 정정, 수집 및 이용에 대한 동의 철회", "고객(만 14세 미만 아동 회원의 경우 법정대리인)은 언제든지 홈페이지 및 모바일 어플리케이션에 등록되어 있는 본인의 개인정보(회원정보, 이용·제공 내역, 동의 내역)를 열람하거나 정정하실 수 있으며, 탈퇴를 요청할 수 있습니다.", "8. 개인정보 파기절차 및 방법", "고객의 개인정보는 원칙적으로 개인정보의 수집 및 이용목적이 달성되면 지체 없이 파기합니다. 개인정보 파기절차 및 방법은 다음과 같습니다.", "파기절차", "고객이 서비스 이용 등을 위해 입력하신 정보는 목적이 달성된 후 별도의 DB로 옮겨져(종이의 경우 별도의 서류함) 내부 방침 및 기타 관련 법령에 의한 정보보호 사유에 따라(보유 및 이용기간 참조) 일정 기간 저장된 후 파기 합니다. 별도 DB로 옮겨진 개인정보는 법률에 의한 경우가 아니고서는 다른 목적으로 이용되지 않습니다.", "파기방법", "종이에 출력된 개인정보: 분쇄기로 분쇄하거나 소각", "전자적 파일 형태로 저장된 개인정보: 기록을 재생할 수 없는 기술적 방법을 사용하여 삭제", "9. 개인정보 자동수집 장치의 설치·운영 및 거부에 관한 사항", "【회사명】은 고객님의 정보를 수시로 저장하고 찾아내는 '쿠키(cookie)' 및 모바일 광고식별자(IDFA·ADID)를 운용합니다.", "쿠키 및 광고식별자 등 운영 목적", "회원과 비회원의 접속 빈도나 방문 시간 등을 분석, 이용자의 취향과 관심 분야 파악, 각종 이벤트 참여 정도 및 방문 회수 파악 등을 통한 타겟 마케팅 및 개인 맞춤 서비스 제공", "쿠키 및 광고식별자 설정 거부 방법", "PC 브라우저: 도구 > 인터넷 옵션 > 개인정보에서 수정 (브라우저별 상이)", "iOS: 설정 > 개인정보 보호 및 보안 > 추적 (App Tracking Transparency)", "Android: 설정 > Google > 광고 > 광고ID 삭제", "단, 귀하께서 쿠키 설치를 거부하였을 경우 쿠키를 이용한 서비스 제공에 어려움이 있을 수 있습니다.", "10. 개인정보 처리위탁", "【회사명】(이하 '회사')은 수집된 개인정보의 처리 및 관리 등의 업무를 스스로 수행함을 원칙으로 하나, 원활한 업무 처리를 위해 필요한 경우 업무의 일부 또는 전부를 '회사'가 선정한 업체에 위탁할 수 있습니다. 위탁업체가 추가 또는 변경되는 경우에 이를 고객에게 고지합니다. '회사'는 위탁계약 체결 시 개인정보보호법 제26조에 따라 위탁업무 수행목적 외 개인정보 처리금지, 기술적·관리적 보호조치, 재위탁 제한, 수탁자에 대한 관리·감독, 손해배상 등 책임에 관한 사항을 계약서 등 문서에 명시하고, 수탁자가 개인정보를 안전하게 처리하는지를 감독하고 있습니다.", "현재 '회사'의 개인정보처리 수탁자와 그 업무의 내용은 다음과 같습니다.", "【수탁사1 — 서버 호스팅·클라우드 사업자】", "위탁업무내용: 개인정보 식별 및 중복가입 여부 확인, 【멤버십 서비스명】 어플리케이션 운영을 위한 서버 호스팅", "보유 및 이용기간: 회원 탈퇴 시 혹은 위탁계약 종료 시까지", "【수탁사2 — 멤버십 운영 플랫폼 사업자】", "위탁업무내용: 개인정보 보관 및 유지, 스탬프 적립 및 사용, 멤버십 관련 서비스, 마케팅 정보 발송(PUSH, SMS, LMS, E-mail), 카카오톡 비즈메시지 발송 대행", "보유 및 이용기간: 회원 탈퇴 후 30일 혹은 위탁계약 종료 시까지", "【수탁사3 — 본인확인기관】", "위탁업무내용: 실명인증, 본인확인, SMS 전송", "보유 및 이용기간: 회원 탈퇴 시 혹은 위탁계약 종료 시까지", "㈜소프트먼트", "위탁업무내용: APP 운영 서비스, 개발 및 시스템 유지보수, 마케팅 정보 발송(PUSH, SMS, LMS, E-Mail, 알림톡 등)", "보유 및 이용기간: 회원 탈퇴 후 30일 혹은 위탁계약 종료 시까지", "【수탁사5 — 모바일상품권 운영사 (해당 시)】", "위탁업무내용: 모바일상품권(교환권/금액권)의 구매 및 사용", "보유 및 이용기간: 회원 탈퇴 후 30일 혹은 위탁계약 종료 시까지", "10-1. 개인정보의 국외 이전", "조항 활성화 안내 국외에 소재한 클라우드(예: AWS·Azure·GCP)를 이용하는 경우 본 조항을 활성화합니다. 국내 리전(예: NHN Cloud·NCloud Seoul Region)만 사용하는 경우 본 조항 전체 삭제 가능합니다.", "'회사'는 원활한 서비스 제공을 위하여 다음과 같이 개인정보를 국외로 이전할 수 있으며, 이전 시 정보주체에게 별도 고지하고 동의를 받습니다.", "이전받는 자: 【해외 클라우드/플랫폼 사업자명】", "이전 일시 및 방법: 서비스 이용 시 네트워크를 통한 상시 이전", "이전되는 국가: 【국가명·리전】", "이전 항목: 회원 식별정보, 서비스 이용기록 등 본 처리방침 제2항에 기재된 항목", "이전 목적: 클라우드 인프라 운영, 데이터 저장 및 백업", "보유·이용 기간: 회원 탈퇴 시 또는 위탁계약 종료 시까지", "표준계약: 개인정보보호법 시행령 제29조의10에 따른 표준계약(SCC) 체결", "11. 개인정보보호 담당자의 연락처", "【회사명】은 고객의 개인정보를 보호하고 개인정보와 관련한 불만을 처리하기 위하여 아래와 같이 관련 부서 및 개인정보보호 담당자를 지정하고 있습니다.", "[개인정보보호책임자]", "성명: 【성명】", "부서: 【부서명】 / 직위: 【직위】", "전자메일: 【이메일】 / 전화번호: 【전화번호】 / 팩스번호: 【팩스번호】", "[개인정보보호담당자]", "성명: 【성명】", "부서: 【부서명】 / 직위: 【직위】", "전자메일: 【이메일】 / 전화번호: 【전화번호】 / 팩스번호: 【팩스번호】", "[개인정보보호담당부서]", "부서명: 【부서명】", "전자메일: 【이메일】 / 전화번호: 【고객센터 번호】 / 팩스번호: 【팩스번호】", "12. 의견수렴 및 불만처리", "고객님께서는 【회사명】의 서비스를 이용하시며 발생하는 모든 개인정보보호 관련 민원을 개인정보보호 담당자 혹은 담당부서로 신고하실 수 있습니다. 당사는 이용자들의 신고사항에 대해 신속하게 충분한 답변을 드릴 것입니다.", "기타 개인정보침해에 대한 신고나 상담이 필요하신 경우에는 아래 기관에 문의하시기 바랍니다.", "개인정보침해신고센터 — 전화: (국번없이) 118 / URL: https://privacy.kisa.or.kr", "개인정보분쟁조정위원회 — 전화: 1833-6972 / URL: https://www.kopico.go.kr", "대검찰청 사이버수사과 — 전화: (국번없이) 1301 / URL: https://www.spo.go.kr", "경찰청 사이버수사국 — 전화: (국번없이) 182 / URL: https://ecrm.police.go.kr", "13. 개인정보를 위한 기술적·관리적 대책", "【회사명】은 개인정보를 처리함에 있어 도난, 분실, 변조, 유출 또는 훼손되지 않도록 안전성 확보를 위하여 다음과 같은 기술적·관리적 대책을 강구하고 있습니다.", "(1) 기술적 대책", "개인정보는 그 종류에 따라 관련 법령이 요구하는 수준의 암호화 저장 또는 전송 시 암호화 기술 적용하여 관리합니다.", "백신프로그램을 이용하여 컴퓨터 바이러스에 의한 피해를 방지하기 위한 조치를 취하고 있으며, 백신프로그램을 주기적으로 업데이트하고 갑작스러운 바이러스 출현 시에 백신이 나오는 즉시 이를 제공함으로써 개인정보가 침해되는 것을 방지하고 있습니다.", "암호알고리즘을 이용하여 네트워크상 개인정보를 안전하게 전송하는 보안장치(SSL/TLS 등)를 채택하고 있습니다.", "해킹 등 외부침입에 대비하여 각 서버마다 침입차단시스템 및 취약점 분석시스템 등을 이용하여 보안에 만전을 기하고 있습니다.", "(2) 관리적 대책", "'회사'는 개인정보 보호에 관한 내부관리계획을 수립, 시행하고 있습니다.", "'회사'는 개인정보에 대한 접근권한을 필요·최소한의 인원으로 제한하고 있습니다.", "'회사'는 개인정보를 처리하는 직원을 대상으로 보안기술 습득 및 개인정보 보호의무 등에 관해 정기적인 사내 교육 및 외부 위탁 교육을 실시합니다.", "'회사'는 직원 입사 시 보안서약서를 통하여 사람에 의한 정보유출을 사전에 방지하고 개인정보처리방침에 대한 이행사항 및 직원의 준수 여부를 감사하기 위한 내부절차를 마련하고 있습니다.", "개인정보 처리자의 업무 인수인계는 보안이 유지된 상태에서 철저하게 이루어지도록 하며 입사 및 퇴사 후 개인정보 사고에 관한 책임을 명확히 합니다.", "14. 영업의 양도·합병 등에 따른 개인정보 이전", "'회사'는 영업의 전부 또는 일부를 양도하거나 합병·상속 등으로 개인정보를 이전하는 경우, 사전에 정보주체에게 개인정보를 이전하는 자, 이전받는 자의 성명·주소·연락처, 정보주체가 동의를 철회할 수 있는 방법 및 절차를 서면·전자우편 등을 통해 통지합니다.", "15. 시행일자", "본 개인정보 처리방침은 【시행일자】부터 적용됩니다. 변경이 있는 경우 앱 공지사항 또는 웹사이트를 통해 사전 고지합니다."]},
     {"n": "위치기반서비스 이용약관", "s": "'매장 찾기' 등 위치정보 이용 동의 규정(위치정보법). 위치 기능 미사용 시 생략 가능.", "full": ["[표준 참고자료 #03]", "위치기반서비스 이용약관", "표준 참고자료 — 위치정보의 보호 및 이용 등에 관한 법률 기반", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "적용 범위 위치정보를 사용하지 않는 앱이면 본 문서 전체를 제외할 수 있습니다. 매장찾기·주변 매장 추천·픽업오더·배달 위치 확인·위치 기반 혜택 제공 기능이 있다면 반드시 준비해야 합니다.", "사업 신고 안내 타사 위치정보를 수집·제공하는 사업은 '개인위치정보사업'(허가), 자체 LBS 운영은 '위치기반서비스사업'(신고) 대상입니다. 무신고 사업 시 5년 이하 징역 또는 5천만원 이하 벌금. 신고 필요 시 방송통신위원회에 사업개시 30일 전 신고. 자사 사업 형태는 신고 필요성을 사전 검토하시기 바랍니다.", "제 1조 (목적)", "본 약관은 【회사명】(이하 '회사')이 제공하는 【앱/서비스명】의 위치기반서비스와 관련하여 회사와 이용자 간의 권리, 의무 및 책임사항을 정함을 목적으로 합니다.", "제 2조 (이용약관의 효력 및 변경)", "본 약관은 위치기반서비스를 이용하는 이용자에게 그 효력이 발생합니다.", "회사는 「위치정보의 보호 및 이용 등에 관한 법률」, 「약관의 규제에 관한 법률」, 「전자거래기본법」 등 관련법령에 위배되지 않는 범위에서 본 약관을 변경할 수 있으며, 약관을 변경할 경우에는 적용일자 7일 전(이용자에게 불리하거나 중대한 변경의 경우 30일 전)부터 앱 공지사항을 통해 공지합니다.", "제 3조 (관계법령의 적용)", "본 약관에 명시되지 아니한 사항은 「위치정보의 보호 및 이용 등에 관한 법률」, 「정보통신망 이용촉진 및 정보보호 등에 관한 법률」, 「개인정보보호법」 등 관련 법령 및 회사가 정한 서비스의 세부이용지침 등의 규정에 따릅니다.", "제 4조 (서비스 내용 및 요금)", "회사는 이용자의 위치정보를 활용하여 다음 각 호의 서비스를 제공할 수 있습니다.", "현재 위치 기반 주변 매장 안내 및 검색", "가까운 가맹점·매장 추천", "위치 기반 쿠폰·이벤트·혜택 제공", "픽업·배달 위치 확인", "기타 위치정보를 활용한 서비스", "위치기반서비스는 무료로 제공됩니다. 다만, 위치정보 송수신에 따른 데이터 통신요금은 이용자가 부담합니다.", "제 5조 (개인위치정보의 수집·이용·제공)", "회사는 위치기반서비스를 제공하기 위해 이용자의 사전 동의를 받은 경우에 한하여 개인위치정보를 수집·이용합니다.", "회사는 위치정보 수집 시 다음 사항을 사전에 고지하고 동의를 받습니다.", "위치정보 수집·이용·제공 목적", "위치정보 수집·이용·제공 항목 및 보유기간", "동의 거부권 및 거부 시 불이익", "제 6조 (개인위치정보의 보유·이용기간)", "회사는 위치기반서비스 제공 목적이 달성되면 개인위치정보를 지체 없이 파기합니다.", "「위치정보의 보호 및 이용 등에 관한 법률」 제16조 제2항에 따라 회사는 개인위치정보의 이용·제공사실 확인자료를 자동으로 기록·보관하며, 해당 자료는 최소 6개월 이상 보관합니다.", "제 7조 (개인위치정보주체의 권리)", "이용자는 언제든지 개인위치정보 수집·이용·제공에 대한 동의의 전부 또는 일부를 철회할 수 있습니다. 이 경우 회사는 지체 없이 수집된 개인위치정보 및 위치정보 이용·제공사실 확인자료를 파기합니다.", "이용자는 회사에 대하여 다음 각 호의 자료에 대한 열람 또는 고지를 요구할 수 있고, 해당 자료에 오류가 있는 경우에는 그 정정을 요구할 수 있습니다.", "본인에 대한 위치정보 수집·이용·제공사실 확인자료", "본인의 개인위치정보가 본 법률 또는 다른 법령의 규정에 의하여 제3자에게 제공된 이유 및 내용", "제 8조 (법정대리인의 권리)", "회사는 14세 미만의 아동으로부터 개인위치정보를 수집·이용 또는 제공하고자 하는 경우 법정대리인의 동의를 받습니다.", "8세 이하의 아동, 피성년후견인, 「장애인복지법」 제2조 제2항 제2호에 따른 정신적 장애를 가진 사람으로서 「장애인고용촉진 및 직업재활법」 제2조 제2호에 따른 중증장애인에 해당하는 사람(장애인복지법 제32조에 따라 장애인 등록을 한 사람에 한정한다)의 보호의무자가 그 보호하에 있는 자의 생명·신체의 보호를 위하여 개인위치정보의 이용 또는 제공에 동의하는 경우에는 본인의 동의가 있는 것으로 봅니다.", "제 9조 (위치정보의 제3자 제공)", "회사는 이용자의 동의 없이 개인위치정보를 제3자에게 제공하지 않습니다. 다만, 이용자가 사전에 동의한 경우 또는 법령에 근거가 있는 경우에는 예외로 합니다.", "결정 사항 위치정보의 제3자 제공이 발생하는 경우(예: 배달 대행사에 위치정보 제공) ① 제공받는 자, ② 제공 목적, ③ 제공 항목, ④ 보유·이용기간을 본 조에 별도로 기재합니다. 별첨 가이드 결정 체크리스트 A2 항목을 회신해 주십시오.", "제 10조 (위치정보 보호조치)", "회사는 위치정보의 분실·도난·유출·변조·훼손을 방지하기 위해 위치정보시스템에 대한 접근권한 제한, 위치정보의 암호화, 위치정보처리시스템 접속기록 보관(6개월 이상) 등 관리적·기술적 보호조치를 시행합니다.", "제 11조 (위치정보관리책임자)", "성명: 【위치정보관리책임자 성명】", "부서: 【부서명】 / 직위: 【직위】", "전화: 【전화번호】 / 이메일: 【이메일】", "제 12조 (손해배상 및 면책)", "회사가 본 약관 또는 「위치정보의 보호 및 이용 등에 관한 법률」을 위반하여 이용자에게 손해가 발생한 경우, 회사는 그 손해를 배상할 책임이 있습니다. 다만, 회사의 고의 또는 과실이 없는 경우에는 그러하지 아니합니다.", "회사는 천재지변, 통신장애, 단말기 설정 오류 등 회사의 귀책사유 없이 발생한 위치정보 오차에 대해 책임을 지지 않습니다.", "부칙", "본 약관은 【시행일자】부터 시행합니다."]},
     {"n": "마케팅 정보 수신 동의서", "s": "광고성 푸시·문자·이메일 발송 동의(선택). 미동의해도 서비스 이용에는 지장 없음.", "full": ["[표준 참고자료 #04]", "마케팅 정보 수신 동의서", "표준 참고자료 — 정보통신망법 §50 기반", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "1. 수신 동의의 목적", "【회사명】(이하 '회사')은 회원에게 다음과 같은 마케팅·광고성 정보를 제공하기 위해 본 동의를 받습니다.", "이벤트, 프로모션, 할인, 쿠폰, 적립 혜택 안내", "신상품·신규 서비스 소개", "회원 등급별 맞춤 혜택 안내", "기타 회사가 제공하는 광고성 정보", "2. 수집·이용 항목", "휴대전화번호, 이메일, 앱푸시 토큰, 생년월일, 성별, 서비스 이용기록", "3. 수신 방법 및 보유 기간", "앱푸시, 문자(SMS·LMS·MMS), 카카오 알림톡·친구톡, 이메일 등을 통해 발송되며, 보유 기간은 동의 철회 또는 회원탈퇴 시까지입니다.", "4. 동의 항목 (이용자 선택)", "아래 항목은 회원의 선택사항입니다. 동의하지 않더라도 서비스 이용에는 제한이 없습니다.", "구분", "동의 내용", "동의 여부", "일반 마케팅 수신 동의", "08:00~21:00 시간대 광고성 정보 수신에 동의합니다.", "☐ 동의   ☐ 미동의", "야간 마케팅 수신 동의", "21:00~익일 08:00 시간대 광고성 정보 수신에 동의합니다.", "※ 정보통신망법 §50③ — 별도 동의 필수", "☐ 동의   ☐ 미동의", "앱푸시 수신 동의", "앱푸시를 통한 광고성 정보 수신에 동의합니다.", "☐ 동의   ☐ 미동의", "문자 수신 동의", "SMS·LMS·MMS, 카카오 알림톡·친구톡을 통한 광고성 정보 수신에 동의합니다.", "☐ 동의   ☐ 미동의", "이메일 수신 동의", "이메일을 통한 광고성 정보 수신에 동의합니다.", "☐ 동의   ☐ 미동의", "5. 광고성 정보 발송 시 표기 사항", "회사는 정보통신망법 §50④ 및 시행령 §61에 따라 광고성 정보 전송 시 다음 사항을 표시합니다.", "발신자명: 【브랜드명】", "제목·본문 시작 부분에 \"(광고)\" 표기", "수신거부 의사 표시 방법(무료 수신거부 수단 포함)", "6. 동의 철회 방법", "회원은 언제든지 다음의 방법으로 수신 동의를 철회할 수 있으며, 즉시 발송이 중지됩니다.", "앱 내 \"내 정보 > 알림 설정\"에서 직접 변경", "문자·이메일 본문 하단의 수신거부 링크 클릭", "고객센터 【고객센터 번호】 또는 【고객센터 이메일】로 요청", "7. 수신 동의 유지 확인", "회사는 정보통신망법 §50⑧에 따라 수신 동의일로부터 2년마다 회원에게 마케팅 수신 동의 유지 여부를 확인합니다. 확인 요청에 응답하지 않는 경우 수신 동의가 철회된 것으로 처리될 수 있습니다.", "8. 시행일자", "본 동의서는 【시행일자】부터 적용됩니다."]},
     {"n": "푸시 알림 수신 동의서", "s": "앱 푸시 알림 발송 동의. 주문·적립·쿠폰 등 서비스 알림에 사용.", "full": ["[표준 참고자료 #05]", "푸시 알림 수신 동의서", "표준 참고자료 — 광고성/일반 알림 분리 운영", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "1. 푸시 알림의 구분", "회사가 발송하는 푸시 알림은 다음과 같이 구분됩니다.", "구분", "내용", "동의 필요", "운영성 푸시", "주문 접수·제조 완료·픽업 요청, 결제 결과, 배송 상태, 회원 등급 변동, 보안 알림, 약관 변경 등 서비스 운영에 필수적인 알림", "동의 불요 (필수 알림)", "광고성 푸시", "이벤트, 할인, 신상품 안내, 맞춤 혜택 등 마케팅·광고 목적의 알림", "별도 동의 필수", "운영성 푸시 안내 운영성 푸시는 회원가입 시 본 약관·이용안내에 사전 고지하는 형태로 발송되며, 별도 동의가 필요하지 않습니다. 회원은 단말기 OS 설정을 통해 모든 알림을 차단할 수 있으나, 이 경우 주문 진행 상황 등 필수 정보를 받지 못할 수 있습니다.", "2. 광고성 푸시 동의 항목", "구분", "동의 여부", "광고성 푸시 알림 수신 (08:00~21:00)", "☐ 동의   ☐ 미동의", "야간 광고성 푸시 알림 수신 (21:00~익일 08:00)", "※ 정보통신망법 §50③ — 별도 동의 필수", "☐ 동의   ☐ 미동의", "3. 수신 거부 방법", "앱 내 \"내 정보 > 알림 설정\"에서 알림 유형별 ON/OFF", "단말기 OS 설정 > 알림 > 【앱명】에서 알림 차단", "4. 시행일자", "본 동의서는 【시행일자】부터 적용됩니다."]},
     {"n": "만 14세 미만 아동 회원가입 법정대리인 동의서", "s": "만 14세 미만 가입 허용 시 법정대리인 동의 절차. 미허용이면 불필요.", "full": ["[표준 참고자료 #06]", "만 14세 미만 아동 회원가입 법정대리인 동의서", "표준 참고자료 — 개인정보보호법 §22의2", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "적용 안내 14세 미만 가입을 허용하는 경우에만 사용합니다. 가입 자체를 제한하는 정책인 경우 본 문서는 사용하지 않고, 가입 화면에서 만 14세 미만 가입 제한 안내만 노출합니다. 정책 결정은 가이드 결정 체크리스트 A1 항목 참조.", "1. 동의의 의의", "【회사명】(이하 '회사')은 「개인정보보호법」 제22조의2에 따라 만 14세 미만 아동의 회원가입 및 개인정보 수집·이용에 대해 법정대리인의 동의를 받고 있습니다. 본 동의서는 만 14세 미만 아동의 회원가입 시 법정대리인이 동의해야 하는 사항을 안내합니다.", "2. 법정대리인의 개인정보 수집·이용", "회사는 법정대리인의 동의 여부 확인을 위해 다음과 같이 법정대리인의 개인정보를 수집·이용합니다.", "구분", "내용", "수집 목적", "법정대리인의 동의 여부 확인", "수집 항목", "법정대리인 성명, 생년월일, 휴대폰번호, 본인확인기관을 통한 본인확인 결과값", "보유·이용 기간", "법정대리인 동의 확인 완료 후 즉시 파기 (단, 동의 사실의 기록은 5년간 보관)", "거부 권리", "법정대리인은 본 동의를 거부할 수 있으며, 거부 시 아동의 회원가입이 제한됩니다.", "3. 아동의 개인정보 수집·이용 동의 사항", "회사는 만 14세 미만 아동의 회원가입 및 서비스 제공을 위해 다음과 같이 아동의 개인정보를 수집·이용합니다.", "구분", "내용", "수집 목적", "회원가입 및 본인확인, 서비스 제공, 고객 상담, 부정이용 방지", "수집 항목", "성명, 생년월일, 성별, 휴대폰번호, 닉네임", "보유·이용 기간", "회원 탈퇴 시까지 (관련 법령에 따른 보관 의무가 있는 경우 해당 기간)", "서비스 제한 사항 회사는 만 14세 미만 아동 회원에게 마케팅 정보 수신·결제 기능·선물하기 기능 등 일부 서비스의 이용을 제한할 수 있습니다. 구체적 제한 범위는 회사의 운영정책에 따르며, 가입 화면에서 사전 안내됩니다.", "4. 법정대리인의 권리", "법정대리인은 언제든지 아동의 개인정보에 대한 열람·정정·삭제·처리정지·동의철회를 요청할 수 있습니다.", "요청은 앱 내 \"법정대리인 메뉴\" 또는 고객센터(【고객센터 번호】 / 【고객센터 이메일】)를 통해 가능합니다.", "개인정보보호책임자: 【성명】 / 【이메일】 / 【전화번호】", "5. 동의 확인", "위 사항을 충분히 이해하였으며, 만 14세 미만 아동의 회원가입 및 개인정보 수집·이용에 대해 법정대리인으로서 동의합니다.", "☐ 법정대리인의 개인정보 수집·이용에 동의합니다.", "☐ 만 14세 미만 아동의 개인정보 수집·이용에 동의합니다.", "법정대리인 성명: ____________________   (아동과의 관계: ____________)", "동의 일자: 【YYYY-MM-DD】", "6. 시행일자", "본 동의서는 【시행일자】부터 적용됩니다."]},
     {"n": "본인확인서비스 이용 동의서", "s": "휴대폰 본인확인(CI/DI) 이용 동의. 본인인증(다날) 도입 시 적용.", "full": ["[표준 참고자료 #07]", "본인확인서비스 이용 동의서", "표준 참고자료 — 본인확인기관(KISA 지정) 이용 시", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "적용 안내 휴대폰 본인인증, 아이핀(I-PIN), 공동인증서, 토스인증 등 본인확인 수단을 도입하는 경우 사용합니다. 회원가입·결제·중요 거래 시점에 별도 동의 화면으로 노출합니다.", "1. 본인확인서비스의 의의", "【회사명】(이하 '회사')은 회원가입, 본인 확인, 부정 이용 방지를 위해 방송통신위원회가 지정한 본인확인기관의 본인확인서비스를 이용합니다.", "2. 본인확인기관", "【본인확인기관명 — 결정 체크리스트 A3 참조】", "3. 본인확인 시 수집·제공 정보", "구분", "수집·제공 항목", "회사가 본인확인기관에 제공", "이용자가 입력한 성명, 생년월일, 성별, 휴대폰번호, 통신사 정보", "본인확인기관이 회사에 제공", "본인확인 결과값(CI, DI), 본인확인 성공 여부, 본인확인 시간", "4. 본인확인 정보의 이용 목적", "회원가입 시 본인 확인 및 실명·연령 확인", "중복 가입 방지", "부정 이용·계정 도용 방지", "결제·환불 등 중요 거래 시 본인 확인", "법령에 따른 본인확인 의무 이행", "5. 보유 및 이용기간", "본인확인 결과값(CI, DI)은 회원 탈퇴 시까지 보관하며, 회원 탈퇴 시 지체 없이 파기합니다. 다만, 관련 법령에 따라 보관 의무가 있는 경우 해당 기간 동안 보관합니다.", "6. 동의 거부권 및 거부 시 불이익", "이용자는 본인확인서비스 이용에 대한 동의를 거부할 권리가 있습니다. 단, 동의를 거부할 경우 회원가입 및 본인확인이 필요한 서비스 이용이 제한될 수 있습니다.", "7. 동의 확인", "☐ 본인확인서비스 이용 및 본인확인 정보 처리에 동의합니다.", "8. 시행일자", "본 동의서는 【시행일자】부터 적용됩니다."]},
     {"n": "개인정보 제3자 제공 동의서", "s": "PG·본인확인 등 외부 업체에 회원정보를 제공할 때 필요한 동의.", "full": ["[표준 참고자료 #08]", "개인정보 제3자 제공 동의서", "표준 참고자료 — 개인정보보호법 §17", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "적용 안내 처리방침(#02) 내에 항목은 있지만, 회원가입 동의 화면에서 별도 체크박스로 분리 동의 받는 것이 적법 처리입니다. 가맹점·PG사·배송사·CS외주사 등 제3자가 있는 경우 모두 기재합니다.", "1. 개인정보 제3자 제공의 의의", "【회사명】(이하 '회사')은 원칙적으로 이용자의 개인정보를 외부에 제공하지 않으나, 주문·결제·배송·가맹점 서비스 제공 등을 위해 다음과 같이 제3자에게 제공할 수 있습니다.", "2. 제공받는 자, 제공 목적, 제공 항목, 보유 기간", "제공받는 자", "제공 목적", "제공 항목", "보유·이용 기간", "【가맹점명 또는 가맹점 리스트 별도 안내】", "주문 확인, 상품 제공, 가맹점 멤버십 혜택 처리", "성명, 휴대폰번호, 주문정보, 스탬프·쿠폰 사용내역", "서비스 제공 완료 시까지", "【PG사명】", "결제 처리 및 환불", "결제정보, 주문정보, 본인확인 정보", "관련 법령에 따른 보관 기간", "【배송사·배달대행사명】", "배송·배달 처리", "수령인 성명, 연락처, 주소", "배송 완료 후 30일", "【모바일상품권 운영사】", "교환권·금액권 발행 및 사용 처리", "성명, 휴대폰번호, 구매·사용 내역", "회원 탈퇴 후 30일 또는 위탁계약 종료 시까지", "【본인확인기관】", "본인확인", "성명, 생년월일, 성별, 휴대폰번호", "본인확인 완료 시 즉시 파기", "결정 사항 실제 사업자명을 정확히 기재. 가맹점 리스트의 경우 별도 페이지·부록으로 운영하고 본 동의서에는 링크·QR 안내 권고. 가이드 결정 체크리스트 A8 항목을 회신해 주십시오.", "3. 동의 거부 권리 및 거부 시 불이익", "이용자는 개인정보 제3자 제공에 대한 동의를 거부할 권리가 있습니다. 단, 동의 거부 시 주문·결제·배송·가맹점 혜택 등 관련 서비스 이용이 제한될 수 있습니다.", "4. 동의 확인", "☐ 개인정보의 제3자 제공에 동의합니다.", "5. 시행일자", "본 동의서는 【시행일자】부터 적용됩니다."]},
     {"n": "취소·환불 정책", "s": "멤버십 결제·상품의 취소·환불 규정(전자상거래법 기반).", "full": ["[표준 참고자료 #11]", "취소·환불 정책", "표준 참고자료 — 전자상거래법 §17·§18 기반", "버전: v1.1  |  작성일: 2026-05-22", "고객사 정책 반영 후 시행 — 시행 전 외부 법무 검토 필수", "⚠ 면책 안내 본 문서는 자사앱 구축을 위한 표준 참고자료입니다. 적용 고객사 기준에서 제공되는 문서 초안이며, 시행 전 반드시 자격 있는 변호사 또는 외부 법무법인의 검토를 받은 후 확정해야 합니다. 본 자료를 그대로 시행함으로 인해 발생하는 법적 책임은 시행 주체(고객사)에게 귀속됩니다.", "【항목】 = 고객사가 입력해야 하는 자리표시자 — 가이드의 결정 체크리스트 참조", "적용 안내 주문·결제 기능이 있는 자사앱이라면 필수입니다. 전자상거래법 청약철회권을 명시적으로 반영했습니다.", "제 1조 (목적)", "본 정책은 【회사명】(이하 '회사')이 운영하는 【앱/서비스명】을 통해 이루어진 주문·결제·서비스 이용에 대한 취소·환불·청약철회의 기준을 정함을 목적으로 합니다.", "제 2조 (주문 취소)", "이용자는 주문 상태가 \"상품 준비 전\" 또는 \"서비스 제공 전\"인 경우 주문을 취소할 수 있습니다.", "상품 준비·제작·배송·서비스 제공이 이미 시작된 경우 취소가 제한될 수 있으며, 이 경우 회사는 결제 화면 또는 주문 화면에서 해당 사실을 사전에 고지합니다.", "제 3조 (청약철회)", "이용자는 「전자상거래 등에서의 소비자보호에 관한 법률」 제17조에 따라 계약 체결일·재화 수령일로부터 7일 이내에 청약철회를 할 수 있습니다.", "재화 등의 내용이 표시·광고의 내용과 다르거나 계약내용과 다르게 이행된 경우, 재화를 공급받은 날부터 3개월 이내 또는 그 사실을 안 날부터 30일 이내에 청약철회를 할 수 있습니다.", "다음 각 호의 경우에는 청약철회가 제한될 수 있습니다(전자상거래법 제17조 제2항).", "이용자의 책임 있는 사유로 재화 등이 멸실·훼손된 경우", "이용자의 사용 또는 일부 소비로 재화 등의 가치가 현저히 감소한 경우", "시간이 지남으로써 재판매하기 곤란할 정도로 가치가 현저히 감소한 경우", "복제가 가능한 재화 등의 포장을 훼손한 경우", "개별 주문 제작되는 상품 등 청약철회가 곤란한 경우로서 사전에 동의를 받은 경우", "제 4조 (환불 처리)", "회사는 청약철회·주문취소 후 3영업일 이내에 결제대금을 환급합니다. 다만, PG사·카드사 정책에 따라 실제 환불 시점은 다를 수 있습니다.", "회사가 환급을 지연하는 경우 「전자상거래 등에서의 소비자보호에 관한 법률」 제18조 제2항에 따른 지연이자를 가산하여 지급합니다.", "결제수단별 환급은 다음과 같이 처리됩니다.", "신용·체크카드: 카드사를 통한 결제 취소 (환급까지 3~7영업일 소요)", "휴대폰 소액결제: 당월 결제 건은 결제 취소, 익월 이후는 환불계좌로 입금", "간편결제: 결제수단 사업자 정책에 따름", "교환권·금액권: 잔액 비율에 따른 환불 (본 정책 제5조)", "제 5조 (교환권·금액권 환불)", "금액권 잔액의 환불은 다음과 같이 처리됩니다.", "유효기간 내, 최종 잔액 기준 【잔액 환불 기준】 이상 사용 시: 잔액 100% 환불", "유효기간 만료 시: 잔액의 【만료시 환불율】 환불 (공정위 \"신유형 상품권 표준약관\" 권고)", "소멸시효(5년) 도래 시: 환불 불가", "미사용 교환권 환불은 유효기간 내 100% 환불, 유효기간 만료 시 본 조 제1항 제2호·제3호를 준용합니다.", "프로모션·이벤트로 무상 발행된 교환권·금액권은 환불 대상에서 제외됩니다.", "제 6조 (가맹점 상품의 책임)", "가맹점이 직접 제공하는 상품·서비스의 품질·교환·환불은 해당 가맹점의 정책 및 관련 법령에 따릅니다. 회사는 플랫폼 운영자로서 필요한 범위에서 고객 응대를 지원합니다.", "제 7조 (환불 신청 방법)", "앱 내 \"내 정보 > 주문 내역 > 환불 신청\"", "고객센터 【고객센터 번호】 또는 【고객센터 이메일】", "교환권·금액권 환불: 【모바일상품권 고객센터 번호】", "부칙", "본 정책은 【시행일자】부터 시행합니다."]}

const esc=s=>(""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const shortL=s=>(""+s).replace(/\s*\(.*?\)\s*/g," ").replace(/\s*·.*$/,"").trim()||s;
function fieldDone(f,data){
  if(f.showIf && !f.showIf(data))return true;
  if(f.type==="info")return true;
  const v=data[f.k];
  if(f.type==="multi")return !f.req||(Array.isArray(v)&&v.length>0);
  if(f.type==="confirm")return v===true;
  if(f.type==="date"||f.type==="text"||f.type==="textarea")return !f.req||!!(v&&(""+v).trim());
  if(f.type==="radio"){if(!f.req)return true;if(!v)return false;return f.mustBe?v===f.mustBe:true;}
  if(f.type==="checklist"){if(!f.req)return true;return f.items.every(it=>{const s=(v||{})[it.id];return s==="done"||(it.na&&s==="na")||(s&&typeof s==="object"&&!!s.key);});}
  if(f.type==="terms")return f.items.every((t,i)=>(v||{})[i]&&(v||{})[i].choice);
  if(f.type==="channels")return f.items.every(it=>{const cv=(v||{})[it.id];if(it.kind==="multi")return Array.isArray(cv)&&cv.length>0;return !!cv;});
  if(f.type==="inputs"){if(!f.req)return true;return f.items.every(it=>(((v||{})[it.id])||"").trim());}
  return true;
}
const stepDone=(si,data)=>STEPS[si].fields.every(f=>fieldDone(f,data));
function firstIncomplete(data){for(let i=0;i<STEPS.length;i++)if(!stepDone(i,data))return i;return STEPS.length;}
const progressOf=data=>Math.round(STEPS.filter((_,i)=>stepDone(i,data)).length/STEPS.length*100);

/* ================= api ================= */
const API_BASE="https://3l4r2nrpaf.execute-api.ap-northeast-2.amazonaws.com";
async function api(path,opt){const r=await fetch(API_BASE+path,opt);if(!r.ok)throw new Error("api "+r.status);return r.json();}
let saveTimer=null;
function scheduleSave(){
  S.saving="saving";paintSave();clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await api("/api/brand?b="+encodeURIComponent(BTOK),{method:"PUT",headers:{"content-type":"application/json"},body:JSON.stringify({data:S.brand.data})});S.saving="ok";}
    catch(e){S.saving="err";}
    paintSave();
  },500);
}
function paintSave(){const el=document.getElementById("savest");if(!el)return;
  el.className="savest"+(S.saving==="ok"?" ok":S.saving==="err"?" err":"");
  el.textContent=S.saving==="saving"?"저장 중…":S.saving==="ok"?"✓ 저장됨":S.saving==="err"?"⚠ 저장 실패":"";}

/* ================= mutations ================= */
const D=()=>S.brand.data;
function set(k,v){D()[k]=v;scheduleSave();render();}
function toggleItem(k,id){D()[k]=D()[k]||{};D()[k][id]=D()[k][id]==="done"?null:"done";scheduleSave();render();}
function setNa(k,id){D()[k]=D()[k]||{};D()[k][id]=D()[k][id]==="na"?null:"na";scheduleSave();render();}
function setTerm(k,i,choice){D()[k]=D()[k]||{};D()[k][i]=Object.assign({},D()[k][i],{choice});scheduleSave();render();}
function setTermNote(k,i,note){D()[k]=D()[k]||{};D()[k][i]=Object.assign({},D()[k][i],{note});scheduleSave();}
function setMulti(k,val){let a=Array.isArray(D()[k])?D()[k].slice():[];a.includes(val)?a=a.filter(x=>x!==val):a.push(val);D()[k]=a;scheduleSave();render();}
function setChan(k,id,val,multi){D()[k]=D()[k]||{};
  if(multi){let a=Array.isArray(D()[k][id])?D()[k][id].slice():[];
    if(val==="미사용")a=["미사용"];else{a=a.filter(x=>x!=="미사용");a.includes(val)?a=a.filter(x=>x!==val):a.push(val);}
    D()[k][id]=a;}
  else D()[k][id]=val;
  scheduleSave();render();}
async function uploadFile(k,itemId,file){
  if(!file)return;
  if(file.size>20*1024*1024){alert("파일은 20MB 이하로 올려주세요.");return;}
  S.uploading[k+"."+itemId]=true;render();
  try{
    const pre=await api("/api/upload-url?b="+encodeURIComponent(BTOK),{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({field:k,item:itemId,name:file.name,type:file.type||"application/octet-stream"})});
    const r=await fetch(pre.url,{method:"PUT",headers:{"content-type":file.type||"application/octet-stream"},body:file});
    if(!r.ok)throw new Error("s3 "+r.status);
    D()[k]=D()[k]||{};D()[k][itemId]={name:file.name,key:pre.key,at:new Date().toISOString()};scheduleSave();
  }catch(e){alert("업로드에 실패했어요. 네트워크 확인 후 다시 시도해 주세요.");}
  delete S.uploading[k+"."+itemId];render();
}

  if(S.mode==="loading"){app.innerHTML=`<div class="landing"><p>불러오는 중…</p></div>`;return;}

function brandView(){
  const data=D();const nStep=firstIncomplete(data);

  vs=Math.max(0,Math.min(vs,nStep));
  const allDone=nStep>=STEPS.length;
  const stepper=STEPS.map((st,i)=>{const done=stepDone(i,data);const cur=!allDone&&i===vs&&vs<STEPS.length;
    return `<div class="st ${done?"done":""} ${cur?"cur":""}"><div class="bar"></div><div class="lb">${done?"✓ ":""}${esc(st.tag)}</div></div>`;}).join("");
  if(allDone&&(S.viewStep===undefined||S.viewStep>=STEPS.length)){
    return `<div class="main"><div class="stepper">${stepper}</div>
      <div class="card finish"><div class="em">🎉</div><div class="big">온보딩 완료</div>
      <p>모든 단계 제출이 완료됐어요.<br>소프트먼트 담당 매니저가 내용을 확인하고 연락드릴게요.</p>
      <div class="nav"><span class="sp"></span><button class="btn sub" data-go="${STEPS.length-1}">제출 내용 다시 보기</button><span class="sp"></span></div></div></div>`;}
  const st=STEPS[vs];const complete=stepDone(vs,data);const isLast=vs===STEPS.length-1;
  let gate;
  if(!complete){const f=st.fields.find(f=>!fieldDone(f,data)&&f.type==="radio"&&f.block&&data[f.k]&&data[f.k]!==f.mustBe);
    gate=`<div class="gatemsg">${f?esc(f.block):"이 단계의 필수 항목을 모두 완료하면 다음 단계로 넘어갈 수 있어요."}</div>`;}
  else gate=`<div class="donemsg">이 단계 완료! 다음 단계로 넘어갈 수 있어요.</div>`;
  return `<div class="main"><div class="stepper">${stepper}</div>
    <div class="card">
      <div class="eyebrow">${esc(st.tag)} · STEP ${vs} / ${STEPS.length-1}</div>
      <h1 class="qtitle">${esc(st.title)}</h1><p class="qdesc">${esc(st.desc)}</p>
      <span class="who">🙋 고객사(브랜드)가 진행</span>
      ${st.fields.map(f=>fieldHtml(f,data)).join("")}${gate}
      <div class="nav">
        <button class="btn sub" ${vs===0?"disabled":""} data-go="${vs-1}">이전</button><span class="sp"></span>
        <button class="btn primary" data-go="${vs+1}" ${complete?"":"disabled"}>${isLast?"완료하기":"다음 단계"}</button>
      </div></div>
    <div class="foot">입력하면 자동 저장돼요. 나중에 이 링크로 다시 들어와 이어서 진행할 수 있어요.</div></div>`;
}
function guideBox(g){return `<div class="guide">

  ${g.usual?`<div class="gl"><span class="tagx">보통은</span>${g.usual}</div>`:""}
  ${g.ours?`<div class="go"><span class="tagx">소프트먼트</span>${g.ours}</div>`:""}</div>`;}
function fieldHtml(f,data){
  if(f.showIf && !f.showIf(data))return "";
  const v=data[f.k]; const gb=f.guide?guideBox(f.guide):"";
  if(f.type==="info")
    return `<div class="field"><div class="flabel">${esc(f.label)}</div>${gb}${f.blocks.map(b=>`<div class="pol"><div class="pt"><span class="b">기본</span>${esc(b[0])}</div><div class="pd">${esc(b[1])}</div></div>`).join("")}</div>`;

    return `<div class="field"><div class="flabel">${esc(f.label)} ${f.req?'<span class="req">필수</span>':''}</div>${gb}<textarea class="ta" data-ta="${f.k}" placeholder="${esc(f.ph||"")}">${esc(v||"")}</textarea></div>`;
  if(f.type==="confirm")
    return `<div class="field">${gb}<div class="row ${v===true?"on":""}" data-toggle="${f.k}"><span class="chk">${v===true?"✓":""}</span><span class="txt">${esc(f.label)}</span></div></div>`;
  if(f.type==="date"||f.type==="text")
    return `<div class="field"><div class="flabel">${esc(f.label)}</div>${gb}<input type="${f.type==="date"?"date":"text"}" class="tinput" data-input="${f.k}" value="${esc(v||"")}"></div>`;
  if(f.type==="radio")
    return `<div class="field"><div class="flabel">${esc(f.label)} ${f.req?'<span class="req">필수</span>':''}</div>${gb}
      <div class="opts">${f.options.map(o=>`<button class="opt ${v===o?(f.mustBe&&o!==f.mustBe?"warn on":"on"):""}" data-radio="${f.k}" data-val="${esc(o)}">${esc(o)}</button>`).join("")}</div></div>`;
  if(f.type==="multi"){const arr=Array.isArray(v)?v:[];
    return `<div class="field"><div class="flabel">${esc(f.label)} ${f.req?'<span class="req">필수</span>':''}</div>${gb}
      <div class="opts">${f.options.map(o=>`<button class="opt ${arr.includes(o)?"on":""}" data-multi2="${f.k}" data-val="${esc(o)}">${esc(o)}</button>`).join("")}</div></div>`;}
  if(f.type==="inputs"){
    const rows=f.items.map(it=>{const val=(v||{})[it.id]||"";

    return `<div class="field"><div class="flabel">${esc(f.label)} ${f.req?'<span class="req">필수</span>':''}</div>${gb}${rows}</div>`;}
  if(f.type==="checklist"){

      if(it.file){const up=S.uploading[f.k+"."+it.id];
        return `<div class="row ${on?"on":""} ${na?"na-on":""}">
          <span class="chk">${on?"✓":""}</span>

      return `<div class="row ${on?"on":""} ${na?"na-on":""}" data-cl="${f.k}" data-item="${it.id}">

  return "";
